<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakingTrades Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#0a0a12">

  <!-- Core CSS (always loaded) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sector-rotation.css">

  <!-- V3 chrome (sidebar + refined dark palette). Active when body.v3 class set by sidebar.js -->
  <link rel="stylesheet" href="css/v3-tokens.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/ticker-link.css">

  <!-- External deps -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- PERSISTENT SHELL -->
  <nav id="nav"></nav>
  <!-- Ticker tape injected here by ticker-tape.js on nav:ready -->

  <!-- PAGE CONTENT (swapped by router) -->
  <main id="content"></main>

  <!-- SHARED MODALS (persistent, hidden) -->
  <div id="detail-modal" class="modal-overlay"></div>

  <!-- Core JS -->
  <!-- fetch-json.js MUST load first so its window.fetch interceptor
       is installed before any page scripts run their data/*.json reads -->
  <script src="js/lib/fetch-json.js"></script>
  <script src="js/lib/bt-prices.js"></script>
  <script src="js/lib/live-prices.js"></script>
  <script src="js/lib/tv-symbol.js"></script>
  <script src="js/lib/market-status.js"></script>
  <script src="js/lib/ticker-search.js"></script>
  <script src="js/lib/ticker-tape.js"></script>
  <script src="js/lib/snapshot-strip.js"></script>
  <script src="js/lib/sector-rotation.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/preferences.js"></script>
  <!-- Ticker chip + glossary tooltip helpers (BT.tickerLink, BT.glossaryTerm) -->
  <script src="js/lib/ticker-link.js"></script>
  <!-- V3 sidebar — must load BEFORE shell.js so shell.js can detect window.V3Sidebar -->
  <script src="js/lib/sidebar.js"></script>
  <script src="js/lib/cmdbar.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components/collapsible.js"></script>
  <script src="js/components/fear-greed.js"></script>
  <script src="js/components/vix-regime.js"></script>
  <script src="js/components/detail-modal.js"></script>
  <!-- V3 page stubs (ai-trader, holdings, alerts, settings, about) -->
  <script src="js/pages/stubs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
