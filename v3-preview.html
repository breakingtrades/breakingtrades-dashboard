<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V3 Preview — BreakingTrades</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Base styles (shared with production) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sector-rotation.css">

  <!-- V3 chrome (overlays + scopes via body.v3) -->
  <link rel="stylesheet" href="css/v3-tokens.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <style>
    /* Make real page content fit nicely inside .v3-main */
    body.v3 #content {
      padding: 24px 32px;
      max-width: 1600px;
      margin: 0 auto;
    }
    @media (max-width: 1024px) {
      body.v3 #content { padding: 16px; }
    }

    /* Hide any legacy nav-bar that page CSS may try to render */
    body.v3 .nav-bar { display: none !important; }

    /* Coming-soon banner styling (used by router for unwired pages) */
    body.v3 .coming-soon {
      padding: 80px 32px;
      text-align: center;
      color: var(--text-dim);
      font-size: 18px;
      letter-spacing: 1px;
    }

    /* Preview info banner */
    .v3-preview-banner {
      background: var(--v3-cyan-glow);
      border-bottom: 1px solid rgba(45, 212, 191, 0.3);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }
    .v3-preview-banner svg { color: var(--v3-cyan); flex-shrink: 0; }
    .v3-preview-banner strong { color: var(--v3-cyan); }
    .v3-preview-banner kbd {
      font-family: var(--font-mono); font-size: 10px;
      background: var(--v3-bg-elevated);
      border: 1px solid var(--v3-border-soft);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <!-- The .v3-shell with sidebar + topbar gets prepended by V3Sidebar.mount(). -->
  <main class="v3-main">
    <div class="v3-preview-banner">
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="9" r="7"/><path d="M9 6v3M9 12h.01"/></svg>
      <span><strong>V3 Preview</strong> — real pages, new chrome. Click any sidebar item to navigate. Production index.html unchanged.</span>
    </div>
    <!-- This is what router.js writes pages into -->
    <div id="content"></div>
  </main>

  <!-- Third-party libs (same as production index.html) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- BT framework libs -->
  <script src="js/lib/fetch-json.js"></script>
  <script src="js/lib/bt-prices.js"></script>
  <script src="js/lib/live-prices.js"></script>
  <script src="js/lib/tv-symbol.js"></script>
  <script src="js/lib/market-status.js"></script>
  <script src="js/lib/ticker-search.js"></script>
  <script src="js/lib/ticker-tape.js"></script>
  <script src="js/lib/snapshot-strip.js"></script>
  <script src="js/lib/sector-rotation.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/preferences.js"></script>

  <!-- Router (we want this) but NOT shell.js (legacy top-nav, would conflict) -->
  <script src="js/router.js"></script>
  <script src="js/components/collapsible.js"></script>
  <script src="js/components/fear-greed.js"></script>
  <script src="js/components/vix-regime.js"></script>
  <script src="js/components/detail-modal.js"></script>

  <!-- V3 sidebar component -->
  <script src="js/lib/sidebar.js"></script>

  <!-- Boot -->
  <script>
    (function() {
      // Stub the legacy nav helpers that pages or router may call
      window.BT = window.BT || {};
      BT.pages = BT.pages || {};
      BT.preferences = BT.preferences || {
        getPref: function(k) { try { return JSON.parse(localStorage.getItem('bt:' + k)); } catch(e) { return null; } },
        setPref: function(k, v) { try { localStorage.setItem('bt:' + k, JSON.stringify(v)); } catch(e) {} }
      };
      // Real shell.js owns updateNavActive — V3 sidebar handles its own active state,
      // so provide a no-op stub so router doesn't blow up.
      BT.updateNavActive = BT.updateNavActive || function(route) {
        if (window.V3Sidebar && V3Sidebar.setActive) V3Sidebar.setActive(route);
      };

      // Mount V3 chrome
      V3Sidebar.mount(document.body);

      // Map V3 routes to existing router routes (aliases)
      // V3 sidebar uses: market, watchlist, signals, alerts, expected-moves,
      //                  calendar, research, ai-trader, holdings, settings, about
      // Router knows:    market, watchlist, signals, expected-moves,
      //                  events, week-ahead, airesearcher
      var V3_TO_ROUTER = {
        'calendar':   'events',         // calendar lands on events tab by default
        'research':   'airesearcher',
        'ai-trader':  null,             // not built yet — coming-soon
        'holdings':   null,
        'alerts':     null,
        'settings':   null,
        'about':      null
      };

      // Intercept hashchange BEFORE router sees it: rewrite v3 routes to legacy
      function rewriteHash() {
        var hash = (location.hash || '').replace(/^#\/?/, '');
        var route = hash.split('/')[0].split('?')[0];
        if (V3_TO_ROUTER.hasOwnProperty(route)) {
          var target = V3_TO_ROUTER[route];
          if (target == null) {
            // Show a coming-soon page
            document.getElementById('content').innerHTML =
              '<div class="coming-soon">' +
                '<div style="font-size:32px; margin-bottom:16px;">' +
                  (route === 'ai-trader' ? '🤖' : route === 'holdings' ? '💼' : route === 'alerts' ? '🔔' : route === 'settings' ? '⚙️' : 'ℹ️') +
                '</div>' +
                '<div style="font-size:20px; color:var(--text); margin-bottom:8px;">' + route.charAt(0).toUpperCase() + route.slice(1).replace('-', '-') + '</div>' +
                '<div>Coming in Phase 2B/2C/2D.</div>' +
              '</div>';
            document.title = route + ' — BreakingTrades';
            if (window.V3Sidebar) V3Sidebar.setActive(route);
            return true;
          }
          // Don't actually rewrite hash (V3 active state stays on the v3 route);
          // instead, manually invoke router for the mapped legacy route.
          // But router reads hash directly, so easier to swap hash silently.
          // We use replaceState to avoid double-firing hashchange.
          history.replaceState(null, '', '#' + target);
          return false;  // let router handle the rewritten hash
        }
        return false;
      }

      // Boot router — it'll read the (possibly rewritten) hash and load pages
      if (BT.router && BT.router.start) {
        // Wrap router.start so we rewrite first
        var originalStart = BT.router.start;
        BT.router.start = function() {
          rewriteHash();
          window.addEventListener('hashchange', function() {
            // Active state for V3 sidebar reflects ORIGINAL hash before rewrite
            // but we rewrite for router. Sidebar's own hashchange listener will
            // pick up the rewritten hash, which is fine because aliases are
            // defined in V3Sidebar.getCurrentRoute().
            rewriteHash();
          });
          originalStart.call(BT.router);
        };
        BT.router.start();
      }
    })();
  </script>
</body>
</html>
