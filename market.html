<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market — BreakingTrades</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
<link rel="stylesheet" href="css/sector-rotation.css">
<style>
  :root {
    --bg-primary: #0a0a12;
    --bg-card: #111122;
    --bg-card-hover: #161630;
    --border: #1e1e3a;
    --text: #e0e0e8;
    --text-dim: #8888aa;
    --text-bright: #ffffff;
    --cyan: #00d4aa;
    --orange: #ffa726;
    --red: #ef5350;
    --gold: #ffd700;
    --blue: #42a5f5;
    --purple: #ab47bc;
    --yellow: #ffeb3b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .up { color: var(--cyan); }
  .down { color: var(--red); }
  .neutral { color: var(--text-dim); }


  /* === MACRO STRIP === */
  .vix-structure { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .vix-backwardation { background: rgba(239,83,80,0.1); color: var(--red); }

  /* === PAGE LAYOUT === */
  .page-content { padding: 20px 24px; }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--cyan); font-weight: 600; margin-bottom: 12px;
  }
  #fg-title { cursor: help; }

  /* === HEATMAP === */
  .heatmap-wrap {
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
    background: var(--bg-card); margin-bottom: 24px;
  }

  /* === MID GRID === */
  .mid-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
  }

  /* === FEAR & GREED === */
  .fg-gauge-container {
    display: flex; justify-content: center; align-items: center; flex-direction: column;
    position: relative;
  }
  .fg-gauge-svg { width: 100%; max-width: 340px; height: auto; }
  .fg-value-wrap { text-align: center; margin-top: -28px; position: relative; z-index: 2; }
  .fg-value { font-size: 48px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .fg-label { font-size: 13px; margin-top: 2px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
  .fg-trend { font-size: 11px; margin-top: 6px; text-align: center; }
  .fg-history { display: flex; gap: 0; margin-top: 14px; justify-content: center; width: 100%; }
  .fg-history-item { text-align: center; flex: 1; padding: 8px 4px; position: relative; }
  .fg-history-item:not(:last-child)::after {
    content: ''; position: absolute; right: 0; top: 4px; bottom: 4px;
    width: 1px; background: var(--border);
  }
  .fg-history-item .fgh-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }
  .fg-history-item .fgh-value { font-size: 18px; font-weight: 700; margin-top: 3px; }
  .fg-history-item .fgh-sublabel { font-size: 8px; color: var(--text-dim); margin-top: 1px; }
  @keyframes needleSweep { from { opacity: 0; } to { opacity: 1; } }
  @keyframes needleGlow { 0%,100% { filter: drop-shadow(0 0 3px rgba(255,255,255,0.3)); } 50% { filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); } }

  /* === VIX REGIME === */
  .vix-card { text-align: center; }
  .vix-big-value { font-size: 56px; font-weight: 800; line-height: 1; }
  .vix-regime-label { font-size: 14px; font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }
  .vix-description { font-size: 12px; color: var(--text-dim); margin-top: 8px; line-height: 1.6; }
  .vix-levels { display: flex; gap: 0; margin-top: 16px; width: 100%; }
  .vix-level-item { flex: 1; text-align: center; padding: 8px 4px; position: relative; }
  .vix-level-item:not(:last-child)::after {
    content: ''; position: absolute; right: 0; top: 4px; bottom: 4px;
    width: 1px; background: var(--border);
  }
  .vix-level-item .vl-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }
  .vix-level-item .vl-value { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .vix-bar-wrap { margin-top: 16px; }
  .vix-bar { height: 8px; border-radius: 4px; background: linear-gradient(to right, #00d4aa 0%, #8bc34a 25%, #ffeb3b 45%, #ffa726 65%, #ef5350 85%, #d32f2f 100%); position: relative; }
  .vix-needle { position: absolute; top: -4px; width: 3px; height: 16px; background: #fff; border-radius: 2px; transform: translateX(-50%); transition: left 0.5s; }

  /* === PAIR RATIOS === */
  .pairs-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .pair-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .pair-card .pair-name { font-size: 12px; font-weight: 600; color: var(--text-bright); }
  .pair-card .pair-reading { font-size: 11px; }
  .pair-card .pair-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  /* === SECTOR RANKINGS === */
  .sector-rank-list { list-style: none; }
  .sector-rank-item {
    display: flex; align-items: center; gap: 12px; padding: 8px 0;
    border-bottom: 1px solid #151530;
  }
  .sector-rank-item:last-child { border-bottom: none; }
  .rank-num { width: 24px; font-weight: 700; color: var(--text-dim); font-size: 12px; }
  .rank-name { flex: 1; font-weight: 600; font-size: 12px; }
  .rank-bar-wrap { width: 120px; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .rank-change { width: 60px; text-align: right; font-size: 12px; font-weight: 600; }

  @media (max-width: 900px) {
    .mid-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .page-content { padding: 12px; }
    .pairs-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .pairs-grid { grid-template-columns: 1fr; }
  }

  /* === MARKET BREADTH === */
  .breadth-toggle { display: flex; gap: 4px; margin-bottom: 12px; }
  .breadth-toggle-btn {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 11px; padding: 6px 14px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .breadth-toggle-btn.active { background: rgba(0,212,170,0.1); color: var(--cyan); border-color: var(--cyan); }
  .breadth-chart-wrap { position: relative; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .breadth-chart-wrap canvas { width: 100% !important; }
  .breadth-zone-label { position: absolute; right: 12px; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; opacity: 0.5; }
  .breadth-insight { font-size: 11px; color: var(--text-dim); margin-top: 8px; padding: 8px 12px; background: rgba(0,212,170,0.05); border-left: 3px solid var(--cyan); border-radius: 0 4px 4px 0; }
  .breadth-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .breadth-table th { text-align: left; padding: 8px 12px; color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
  .breadth-table td { padding: 8px 12px; border-bottom: 1px solid #151530; }
  .breadth-table tr:last-child td { border-bottom: none; }
  .breadth-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-weight: 600; font-size: 11px; min-width: 48px; text-align: center; }
  .breadth-badge.oversold { background: rgba(0,212,170,0.15); color: #00d4aa; }
  .breadth-badge.overbought { background: rgba(239,83,80,0.15); color: #ef5350; }
  .breadth-badge.neutral { background: rgba(255,255,255,0.06); color: var(--text); }
  .breadth-summary { display: flex; gap: 16px; margin-bottom: 16px; }
  .breadth-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; flex: 1; text-align: center; }
  .breadth-stat .bs-value { font-size: 28px; font-weight: 800; line-height: 1; }
  .breadth-stat .bs-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }



  .macro-context {
    display: flex;
    gap: 0;
    padding: 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.15);
    font-size: 12px;
  }
  .macro-context::-webkit-scrollbar { display: none; }
  .macro-ctx-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.04);
  }
  .macro-ctx-pill:last-child { border-right: none; }
  .macro-ctx-pill .ctx-label { color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .macro-ctx-pill .ctx-value { font-weight: 600; font-size: 13px; }
  .macro-ctx-pill .ctx-note { font-size: 11px; }
  .ctx-up { color: #00c853; }
  .ctx-down { color: #e57373; }
  .ctx-warn { color: #ffb74d; }
  .ctx-neutral { color: rgba(255,255,255,0.45); }
  .ctx-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .ctx-tag-red { background: rgba(229,115,115,0.1); color: #e57373; }
  .ctx-tag-green { background: rgba(0,200,83,0.15); color: #00c853; }
  .ctx-tag-orange { background: rgba(255,183,77,0.1); color: #ffb74d; }
  .ctx-tag-dim { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }

</style>

<body>

<!-- NAV BAR -->
<nav id="nav"></nav>

<!-- MACRO STRIP -->
<div id="macro-context" class="macro-context"></div>

<!-- MAIN CONTENT -->
<div class="page-content">

  <!-- S&P 500 HEATMAP -->
  <div class="section-title">🗺️ S&P 500 Sector Heatmap</div>
  <div class="heatmap-wrap">
    <div class="tradingview-widget-container" style="width:100%;height:500px;">
      <div class="tradingview-widget-container__widget" id="tv-heatmap" style="width:100%;height:100%;"></div>
    </div>
  </div>

  <!-- SECTOR ROTATION RRG -->
  <div style="margin-top:24px;">
    <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 6.36 2.64"/><path d="M18.36 5.64l-1.5-2.5M18.36 5.64l2.5-1.5"/><path d="M12 21a9 9 0 0 1-6.36-2.64"/><path d="M5.64 18.36l1.5 2.5M5.64 18.36l-2.5 1.5"/></svg> Sector Rotation — Relative Rotation Graph</div>
    <div class="card" style="padding:16px;">
      <div id="rrg-market"></div>

  <!-- FEAR & GREED + VIX REGIME -->
  <div class="mid-grid">
    <div class="card">
      <div class="section-title" id="fg-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 2a10 10 0 0 0-10 10"/><line x1="12" y1="12" x2="7" y2="7"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg> Fear & Greed Index</div>
      <div id="fg-gauge"></div>
    </div>
    <div class="card vix-card">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> VIX Regime</div>
      <div id="vix-regime"></div>
    </div>
  </div>

  <!-- PAIR RATIOS -->
  <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M3 12h18"/><path d="M8 6l-5 6 5 6"/><path d="M16 6l5 6-5 6"/></svg> Pair Ratios — Market Health Signals</div>
  <div class="pairs-grid" id="pairs-grid"></div>

  <!-- SECTOR STRENGTH RANKINGS -->
  <div style="margin-top:24px;">
    <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M6 9V4h12v5a6 6 0 0 1-12 0z"/><line x1="12" y1="15" x2="12" y2="18"/><path d="M8 21h8"/></svg> Sector Strength Rankings</div>
    <div class="card">
      <ul class="sector-rank-list" id="sector-rankings"></ul>
    </div>
  </div>

  <!-- MARKET BREADTH -->
  <div style="margin-top:24px;">
    <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M2 20h20"/><path d="M4 16l4-4 4 4 4-8 4 4"/></svg> Market Breadth</div>

    <!-- Summary Stats -->
    <div class="breadth-summary" id="breadth-summary"></div>

    <!-- Toggle: River Map / Line View -->
    <div class="breadth-toggle">
      <button class="breadth-toggle-btn active" data-view="river" onclick="switchBreadthView('river')">River Map (Stacked)</button>
      <button class="breadth-toggle-btn" data-view="line" onclick="switchBreadthView('line')">Breadth Lines</button>
    </div>

    <!-- Charts -->
    <div class="breadth-chart-wrap" id="breadth-river-wrap">
      <canvas id="breadth-river-chart" height="320"></canvas>
    </div>
    <div class="breadth-chart-wrap" id="breadth-line-wrap" style="display:none;">
      <canvas id="breadth-line-chart" height="320"></canvas>
    </div>

    <div class="breadth-insight" id="breadth-insight"></div>

    <!-- Multi-Timeframe Breadth Table -->
    <div style="margin-top:16px;">
      <div class="section-title" style="font-size:10px;">Multi-Timeframe Breadth</div>
      <div class="card" style="padding:0; overflow-x:auto;">
        <table class="breadth-table" id="breadth-mbt"></table>
      </div>
    </div>
  </div>
</div>

<script src="bt-prices.js"></script>
<script>
// === FEAR & GREED DATA ===
let fearGreedData = {
  current: { value: 50, label: 'Loading...' },
  previousClose: { value: 50 },
  oneWeekAgo: { value: 50 },
  oneMonthAgo: { value: 50 }
};

// === VIX DATA ===
let vixData = {
  current: 0,
  sma20: 0,
  sma50: 0,
  percentile30d: 0,
  regime: 'Loading...',
  color: '#888',
  description: 'Loading real-time volatility metrics...',
  levels: [
    { label: 'Complacency', range: '<15', color: '#00d4aa' },
    { label: 'Normal', range: '15-20', color: '#8bc34a' },
    { label: 'Elevated', range: '20-30', color: '#ffa726' },
    { label: 'Fear', range: '30-40', color: '#ef5350' },
    { label: 'Panic', range: '40+', color: '#d32f2f' }
  ]
};

// === PAIR RATIOS ===
let pairRatios = [];

// === SECTOR RANKINGS ===
let sectorRankings = [];

async function loadMarketData() {
  try {
    const fgRes = await fetch('data/fear-greed.json');
    if(fgRes.ok) fearGreedData = await fgRes.json();
    renderFearGreed();
  } catch(e) { console.error(e); }

  try {
    const vixRes = await fetch('data/vix.json');
    if(vixRes.ok) {
      const liveVix = await vixRes.json();
      vixData = { ...vixData, ...liveVix };
    }
    renderVixRegime();
  } catch(e) { console.error(e); }

  try {
    const pairsRes = await fetch('data/pairs.json');
    if(pairsRes.ok) pairRatios = await pairsRes.json();
    renderPairs();
  } catch(e) { console.error(e); }

  try {
    const srRes = await fetch('data/sectors.json');
    if(srRes.ok) sectorRankings = await srRes.json();
    renderSectorRankings();
  } catch(e) { console.error(e); }
}

// === RENDER FEAR & GREED ===
function renderFearGreed() {
  const val = Math.round(fearGreedData.current.value);
  const cx = 150, cy = 150, r = 110, arcW = 28;

  const zones = [
    { start:0, end:25, color:'#ef5350', label:'EXTREME FEAR' },
    { start:25, end:45, color:'#ffa726', label:'FEAR' },
    { start:45, end:55, color:'#ffeb3b', label:'NEUTRAL' },
    { start:55, end:75, color:'#8bc34a', label:'GREED' },
    { start:75, end:100, color:'#00d4aa', label:'EXTREME GREED' }
  ];

  // 0 = bottom-left (π), 100 = bottom-right (0), arc goes over the top
  function valToAngle(v) { return Math.PI - (v / 100) * Math.PI; }
  function polar(angle, radius) {
    return { x: cx + radius * Math.cos(angle), y: cy - radius * Math.sin(angle) };
  }
  // Clockwise arc (sweep=1) from v1 to v2 — goes over the top
  function arcPath(v1, v2, radius) {
    const p1 = polar(valToAngle(v1), radius), p2 = polar(valToAngle(v2), radius);
    const span = Math.abs(v2 - v1);
    const large = span > 50 ? 1 : 0;
    return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${radius} ${radius} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  // Text path needs to go left-to-right for readability
  function textArcPath(v1, v2, radius) {
    const p1 = polar(valToAngle(v1), radius), p2 = polar(valToAngle(v2), radius);
    const span = Math.abs(v2 - v1);
    const large = span > 50 ? 1 : 0;
    return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${radius} ${radius} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }

  let arcs = '', defs = '', textPaths = '';
  zones.forEach((z, i) => {
    const gap = 0.8;
    const s = z.start + (i === 0 ? 0 : gap);
    const e = z.end - (i === zones.length - 1 ? 0 : gap);
    arcs += `<path d="${arcPath(s, e, r)}" fill="none" stroke="${z.color}" stroke-width="${arcW}" stroke-linecap="round" opacity="0.85"/>`;
    // Curved text labels inside the arc
    const textR = r - arcW/2 + 2;
    const pathId = `fgtp${i}`;
    defs += `<path id="${pathId}" d="${textArcPath(z.start + 1, z.end - 1, textR)}" fill="none"/>`;
    textPaths += `<text><textPath href="#${pathId}" startOffset="50%" text-anchor="middle" fill="${z.color}" font-size="7" font-weight="700" letter-spacing="1.2" opacity="0.6">${z.label}</textPath></text>`;
  });

  // Tick marks at key values
  let ticks = '';
  [0, 25, 50, 75, 100].forEach(v => {
    const angle = valToAngle(v);
    const outer = polar(angle, r + arcW/2 + 3);
    const inner = polar(angle, r + arcW/2 + 10);
    ticks += `<line x1="${outer.x.toFixed(1)}" y1="${outer.y.toFixed(1)}" x2="${inner.x.toFixed(1)}" y2="${inner.y.toFixed(1)}" stroke="#444" stroke-width="1.5"/>`;
    const pt = polar(angle, r + arcW/2 + 20);
    ticks += `<text x="${pt.x.toFixed(1)}" y="${pt.y.toFixed(1)}" fill="#555" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="middle">${v}</text>`;
  });

  // CNN-style thin needle from center to arc
  const needleAngle = valToAngle(val);
  const needleTip = polar(needleAngle, r + arcW/2 - 4);
  const needleBack = polar(needleAngle + Math.PI, 10);
  const valColor = val <= 25 ? '#ef5350' : val <= 45 ? '#ffa726' : val <= 55 ? '#ffeb3b' : val <= 75 ? '#8bc34a' : '#00d4aa';

  const prevVal = fearGreedData.previousClose?.value ?? null;
  const hasPrev = prevVal != null;
  const trendArrow = !hasPrev ? '—' : val > prevVal ? '▲' : val < prevVal ? '▼' : '→';
  const trendColor = !hasPrev ? '#8888aa' : val > prevVal ? '#00d4aa' : val < prevVal ? '#ef5350' : '#8888aa';
  const diff = hasPrev ? val - prevVal : 0;
  function fgColor(v) { if (v == null) return '#555'; return v <= 25 ? '#ef5350' : v <= 45 ? '#ffa726' : v <= 55 ? '#ffeb3b' : v <= 75 ? '#8bc34a' : '#00d4aa'; }
  function fgLabel(v) { if (v == null) return '—'; return v <= 25 ? 'Extreme Fear' : v <= 45 ? 'Fear' : v <= 55 ? 'Neutral' : v <= 75 ? 'Greed' : 'Extreme Greed'; }
  function fgVal(v) { return v != null ? Math.round(v) : '—'; }

  document.getElementById('fg-gauge').innerHTML =
    `<div class="fg-gauge-container">
      <svg viewBox="0 0 300 185" class="fg-gauge-svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          ${defs}
          <filter id="needleShadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/></filter>
        </defs>
        ${arcs}
        ${textPaths}
        ${ticks}
        <g filter="url(#needleShadow)">
          <line x1="${needleBack.x.toFixed(1)}" y1="${needleBack.y.toFixed(1)}" x2="${needleTip.x.toFixed(1)}" y2="${needleTip.y.toFixed(1)}" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <circle cx="${cx}" cy="${cy}" r="6" fill="#1a1a2e" stroke="#e0e0e0" stroke-width="2"/>
        <circle cx="${cx}" cy="${cy}" r="2" fill="#e0e0e0"/>
      </svg>
      <div class="fg-value-wrap">
        <div class="fg-value" style="color:${valColor}; text-shadow: 0 0 20px ${valColor}30;">${val}</div>
        <div class="fg-label" style="color:${valColor}; text-transform: capitalize;">${fearGreedData.current.label}</div>
      </div>
      <div class="fg-trend" style="color:${trendColor}">${hasPrev ? `${trendArrow} ${diff > 0 ? '+' : ''}${Math.round(diff)} from yesterday` : ''}</div>
      <div class="fg-history">
        <div class="fg-history-item"><div class="fgh-label">Prev Close</div><div class="fgh-value" style="color:${fgColor(prevVal)}">${fgVal(prevVal)}</div><div class="fgh-sublabel">${fgLabel(prevVal)}</div></div>
        <div class="fg-history-item"><div class="fgh-label">1 Week</div><div class="fgh-value" style="color:${fgColor(fearGreedData.oneWeekAgo?.value)}">${fgVal(fearGreedData.oneWeekAgo?.value)}</div><div class="fgh-sublabel">${fgLabel(fearGreedData.oneWeekAgo?.value)}</div></div>
        <div class="fg-history-item"><div class="fgh-label">1 Month</div><div class="fgh-value" style="color:${fgColor(fearGreedData.oneMonthAgo?.value)}">${fgVal(fearGreedData.oneMonthAgo?.value)}</div><div class="fgh-sublabel">${fgLabel(fearGreedData.oneMonthAgo?.value)}</div></div>
      </div>
    </div>`;
  // Set tooltip on title with last-updated timestamp
  if (fearGreedData.updated) {
    const fgDate = new Date(fearGreedData.updated);
    const fgTitleEl = document.getElementById('fg-title');
    if (fgTitleEl) fgTitleEl.title = 'Updated: ' + fgDate.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York' }) + ' ET';
  }
}

// === RENDER VIX REGIME ===

  const v = vixData;
  // Needle position: map VIX 10-50 to 0%-100%
  const pct = Math.min(100, Math.max(0, ((v.current - 10) / 40) * 100));

  document.getElementById('vix-regime').innerHTML =
    `<div class="vix-big-value" style="color:${v.color}">${v.current.toFixed(2)}</div>
     <div class="vix-regime-label" style="color:${v.color}">${v.regime}</div>
     <div class="vix-bar-wrap">
       <div class="vix-bar"><div class="vix-needle" style="left:${pct}%"></div></div>
       <div style="display:flex;justify-content:space-between;margin-top:4px;">
         <span style="font-size:9px;color:#00d4aa;">10</span>
         <span style="font-size:9px;color:#8bc34a;">15</span>
         <span style="font-size:9px;color:#ffeb3b;">20</span>
         <span style="font-size:9px;color:#ffa726;">30</span>
         <span style="font-size:9px;color:#ef5350;">40</span>
         <span style="font-size:9px;color:#d32f2f;">50</span>
       </div>
     </div>

       <div class="vix-level-item"><div class="vl-label">SMA20</div><div class="vl-value">${v.sma20}</div></div>
       <div class="vix-level-item"><div class="vl-label">SMA50</div><div class="vl-value">${v.sma50}</div></div>
       <div class="vix-level-item"><div class="vl-label">30d %ile</div><div class="vl-value" style="color:${v.color}">${v.percentile30d}th</div></div>
     </div>`;
}

// === RENDER PAIR RATIOS ===
function renderPairs() {
  document.getElementById('pairs-grid').innerHTML = pairRatios.map(p =>
    `<div class="pair-card">
       <div>
         <div class="pair-name">${p.pair}</div>
         <div class="pair-desc">${p.desc}</div>
       </div>
       <div class="pair-reading ${p.color}" style="font-weight:600;">${p.signal}</div>
     </div>`
  ).join('');
}

// === RENDER SECTOR RANKINGS ===
function renderSectorRankings() {
  document.getElementById('sector-rankings').innerHTML = sectorRankings.map((s, i) => {
    const chgClass = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'neutral';
    const barColor = s.change > 0 ? '#00d4aa' : '#ef5350';
    const barWidth = Math.abs(s.rs);
    return `<li class="sector-rank-item">
      <span class="rank-num">${i + 1}</span>
      <span class="rank-name">${s.symbol} <span style="color:var(--text-dim);font-weight:400;">${s.name}</span></span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${barWidth}%;background:${barColor};"></div></div>
      <span class="rank-change ${chgClass}">${s.change > 0 ? '+' : ''}${s.change.toFixed(1)}%</span>
    </li>`;
  }).join('');
}

// === TIMEZONE ===
const TZ_LABELS = {
  'America/New_York':'ET','America/Chicago':'CT','America/Los_Angeles':'PT',
  'Europe/London':'GMT','Europe/Berlin':'CET','Asia/Jerusalem':'IST',
  'Asia/Tokyo':'JST','Australia/Sydney':'AEST','UTC':'UTC'
};
function initTimezone() {
  const tz = document.getElementById('tz-picker');
  if (!tz) return;
  const saved = localStorage.getItem('bt_timezone');
  if (saved) tz.value = saved;
  tz.addEventListener('change', e => {
    localStorage.setItem('bt_timezone', e.target.value);
    updateTimestamp();
  });
  updateTimestamp();
  setInterval(updateTimestamp, 60000);
}
function updateTimestamp() {
  // Timestamp now handled by market-status.js
}

// === INIT ===
loadMarketData();
initHeatmap();
document.addEventListener("nav:ready", initTimezone);

// === MARKET BREADTH ===
const BREADTH_SECTOR_COLORS = {
  COM: '#9e9e9e', CND: '#ef5350', CNS: '#ff9800', ENE: '#ffeb3b', FIN: '#cddc39',
  HLC: '#4caf50', IND: '#00bcd4', MAT: '#2196f3', RLE: '#e040fb', TEC: '#9c27b0', UTL: '#e91e63'
};
const BREADTH_SECTOR_ORDER = ['COM','CND','CNS','ENE','FIN','HLC','IND','MAT','RLE','TEC','UTL'];

let breadthData = null;
let riverChart = null;
let lineChart = null;

async function loadBreadthData() {
  try {
    const res = await fetch('data/breadth.json');
    if (!res.ok) return;
    breadthData = await res.json();
    renderBreadthSummary();
    renderBreadthRiver();
    renderBreadthLines();
    renderBreadthTable();
    renderBreadthInsight();
  } catch(e) { console.error('Breadth load error:', e); }
}

function renderBreadthSummary() {
  if (!breadthData) return;
  const t = breadthData.total;
  const stackedColor = t.stacked < 200 ? '#00d4aa' : t.stacked > 1000 ? '#ef5350' : 'var(--text)';
  const avgColor = t.average < 20 ? '#00d4aa' : t.average > 80 ? '#ef5350' : 'var(--text)';
  document.getElementById('breadth-summary').innerHTML = `
    <div class="breadth-stat"><div class="bs-value" style="color:${stackedColor}">${t.stacked.toFixed(0)}</div><div class="bs-label">Stacked Total / 1100</div></div>
    <div class="breadth-stat"><div class="bs-value" style="color:${avgColor}">${t.average.toFixed(1)}%</div><div class="bs-label">Average Breadth</div></div>
    <div class="breadth-stat"><div class="bs-value">${Object.keys(breadthData.sectors).length}</div><div class="bs-label">Sectors</div></div>
  `;
}

function renderBreadthRiver() {
  if (!breadthData) return;
  const ctx = document.getElementById('breadth-river-chart').getContext('2d');
  const labels = BREADTH_SECTOR_ORDER.map(s => breadthData.sectors[s]?.name?.split(' ')[0] || s);
  const values = BREADTH_SECTOR_ORDER.map(s => breadthData.sectors[s]?.above_20d || 0);

  if (riverChart) riverChart.destroy();
  riverChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Current'],
      datasets: BREADTH_SECTOR_ORDER.map((code, i) => ({
        label: breadthData.sectors[code]?.name || code,
        data: [values[i]],
        backgroundColor: BREADTH_SECTOR_COLORS[code] + 'cc',
        borderColor: BREADTH_SECTOR_COLORS[code],
        borderWidth: 1,
      }))
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          stacked: true, min: 0, max: 1100,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8888aa', font: { family: 'monospace', size: 10 } }
        },
        y: {
          stacked: true,
          grid: { display: false },
          ticks: { display: false }
        }
      },
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#8888aa', font: { size: 9, family: 'monospace' }, boxWidth: 12, padding: 8 } },
        annotation: {
          annotations: {
            greenZone: { type: 'box', xMin: 0, xMax: 200, backgroundColor: 'rgba(0,212,170,0.08)', borderWidth: 0, label: { display: true, content: 'OVERSOLD ZONE', position: 'start', color: '#00d4aa', font: { size: 9, weight: 'bold' } } },
            redZone: { type: 'box', xMin: 1000, xMax: 1100, backgroundColor: 'rgba(239,83,80,0.08)', borderWidth: 0, label: { display: true, content: 'OVERBOUGHT', position: 'start', color: '#ef5350', font: { size: 9, weight: 'bold' } } }
          }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%`
          }
        }
      }
    }
  });
}

function renderBreadthLines() {
  if (!breadthData) return;
  const ctx = document.getElementById('breadth-line-chart').getContext('2d');
  if (lineChart) lineChart.destroy();

  const datasets = BREADTH_SECTOR_ORDER.map(code => ({
    label: breadthData.sectors[code]?.name || code,
    data: [breadthData.sectors[code]?.above_20d || 0],
    borderColor: BREADTH_SECTOR_COLORS[code],
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    pointRadius: 5,
    pointBackgroundColor: BREADTH_SECTOR_COLORS[code],
  }));
  // S&P 500 total line
  datasets.push({
    label: 'S&P 500 Avg',
    data: [breadthData.total.average],
    borderColor: '#ffffff',
    backgroundColor: 'transparent',
    borderWidth: 3,
    pointRadius: 7,
    pointBackgroundColor: '#ffffff',
  });

  lineChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: ['% Above 20d SMA'], datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 0, max: 100,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8888aa', font: { family: 'monospace', size: 10 }, callback: v => v + '%' }
        },
        x: { grid: { display: false }, ticks: { color: '#8888aa', font: { family: 'monospace', size: 10 } } }
      },
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#8888aa', font: { size: 9, family: 'monospace' }, boxWidth: 12, padding: 8 } },
        annotation: {
          annotations: {
            greenZone: { type: 'box', yMin: 0, yMax: 20, backgroundColor: 'rgba(0,212,170,0.08)', borderWidth: 0 },
            redZone: { type: 'box', yMin: 80, yMax: 100, backgroundColor: 'rgba(239,83,80,0.08)', borderWidth: 0 }
          }
        },
        tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%` } }
      }
    }
  });
}

function switchBreadthView(view) {
  document.querySelectorAll('.breadth-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('breadth-river-wrap').style.display = view === 'river' ? '' : 'none';
  document.getElementById('breadth-line-wrap').style.display = view === 'line' ? '' : 'none';
}

function breadthBadge(val) {
  if (val == null) return '<span class="breadth-badge neutral">—</span>';
  const cls = val <= 20 ? 'oversold' : val >= 80 ? 'overbought' : 'neutral';
  return `<span class="breadth-badge ${cls}">${val.toFixed(1)}%</span>`;
}

function renderBreadthTable() {
  if (!breadthData) return;
  const idx = breadthData.indices;
  const names = { SPX: 'S&P 500', NDX: 'NASDAQ 100', DJI: 'Dow Jones', RUT: 'Russell 2000', VTI: 'Total Market' };
  let html = `<thead><tr><th>Index</th><th>20-Day</th><th>50-Day</th><th>100-Day</th><th>200-Day</th></tr></thead><tbody>`;
  for (const [code, label] of Object.entries(names)) {
    const d = idx[code] || {};
    html += `<tr><td style="font-weight:600;color:var(--text-bright)">${label}</td>`;
    html += `<td>${breadthBadge(d['20d'])}</td><td>${breadthBadge(d['50d'])}</td><td>${breadthBadge(d['100d'])}</td><td>${breadthBadge(d['200d'])}</td></tr>`;
  }
  html += `</tbody>`;
  document.getElementById('breadth-mbt').innerHTML = html;
}

function renderBreadthInsight() {
  if (!breadthData) return;
  const el = document.getElementById('breadth-insight');
  const t = breadthData.total;
  if (t.stacked < 200) {
    el.innerHTML = '💡 <strong>Green Pond Alert:</strong> Stacked breadth is below 200 — historically, market bottoms form near these levels. Watch for reversal signals.';
    el.style.borderLeftColor = '#00d4aa';
  } else if (t.stacked > 1000) {
    el.innerHTML = '⚠️ <strong>Overbought Warning:</strong> Stacked breadth exceeds 1000 — most sectors are extended. Consider tightening stops.';
    el.style.borderLeftColor = '#ef5350';
  } else if (t.average < 30) {
    el.innerHTML = '📊 Breadth is weak — fewer than 30% of stocks are above their 20-day SMA across sectors.';
    el.style.borderLeftColor = '#ffa726';
  } else {
    el.innerHTML = '📊 Market breadth is in a neutral zone. No extreme readings.';
    el.style.borderLeftColor = 'var(--border)';
  }
}

loadBreadthData();
