<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expected Moves — BreakingTrades</title>
<link rel="stylesheet" href="css/nav.css">
<style>
  :root {
    --bg-primary: #0a0a12;
    --bg-card: #111122;
    --bg-card-hover: #161630;
    --border: #1e1e3a;
    --text: #e0e0e8;
    --text-dim: #8888aa;
    --text-bright: #ffffff;
    --cyan: #00d4aa;
    --orange: #ffa726;
    --red: #ef5350;
    --gold: #ffd700;
    --blue: #42a5f5;
    --purple: #ab47bc;
    --yellow: #ffeb3b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 80px 20px 40px; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-header h1 { font-size: 20px; color: var(--text-bright); }
  .page-header .subtitle { font-size: 12px; color: var(--text-dim); }
  .page-header .updated { font-size: 11px; color: var(--text-dim); }

  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding: 10px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 3px;
  }

  /* Table */
  .em-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    white-space: nowrap;
  }
  thead th {
    position: sticky; top: 0;
    background: #0d0d1a;
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: ' ▲'; color: var(--cyan); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--cyan); }
  tbody tr {
    border-bottom: 1px solid rgba(30,30,58,0.5);
    transition: background 0.15s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--bg-card-hover); }
  td {
    padding: 10px 14px;
    font-size: 13px;
  }
  .ticker-cell { font-weight: 700; color: var(--text-bright); }
  .up { color: var(--cyan); }
  .down { color: var(--red); }
  .dim { color: var(--text-dim); font-size: 11px; }

  /* Risk meter — filled bar */
  .risk-bar-wrap {
    width: 120px;
    height: 22px;
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .risk-fill {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    border-radius: 3px;
    transition: width 0.4s, background 0.4s;
  }
  .risk-pct-label {
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--orange);
    z-index: 1;
  }

  /* Risk badge */
  .risk-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Position bar (where price sits in range) */
  .pos-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    position: relative;
    min-width: 80px;
  }
  .pos-fill {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    border-radius: 4px;
    transition: width 0.3s;
  }
  .pos-marker {
    position: absolute;
    top: -3px;
    width: 4px; height: 14px;
    border-radius: 2px;
    background: var(--gold);
    transform: translateX(-50%);
    box-shadow: 0 0 4px rgba(255,215,0,0.5);
  }

  /* Tier tabs */
  .tier-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .tier-tab {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tier-tab:hover { color: var(--text); border-color: var(--text-dim); }
  .tier-tab.active { color: var(--cyan); border-color: var(--cyan); background: rgba(0,212,170,0.08); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text-bright); margin: 4px 0; }
  .stat-sub { font-size: 11px; color: var(--text-dim); }

  @media (max-width: 768px) {
    .risk-bar-wrap { width: 80px; }
    td { padding: 8px 10px; font-size: 12px; }
  }

  /* Alert rows */
  tr.alert-buy {
    background: rgba(27,94,32,0.12) !important;
    border-left: 3px solid #4caf50;
  }
  tr.alert-buy:hover { background: rgba(27,94,32,0.2) !important; }
  tr.alert-sell {
    background: rgba(183,28,28,0.1) !important;
    border-left: 3px solid #f44336;
  }
  tr.alert-sell:hover { background: rgba(183,28,28,0.18) !important; }
  .alert-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    animation: pulse-alert 2s ease-in-out infinite;
  }
  @keyframes pulse-alert {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  /* === DETAIL MODAL === */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
    display: flex; align-items: flex-start; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    overflow-y: auto; padding: 40px 16px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    width: 100%; max-width: 1100px;
    transform: translateY(20px); opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); opacity: 1; }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
  }
  .modal-header .ticker-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .modal-header .modal-ticker { font-size: 22px; font-weight: 700; }
  .modal-header .modal-name { font-size: 12px; color: var(--text-dim); }
  .modal-header .modal-price-tag { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--text-dim); font-size: 24px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .modal-body { padding: 20px 24px; }
  .chart-box { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #0c0c18; margin-bottom: 20px; }
  .chart-label {
    padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim);
  }
  .info-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .info-card { border: 1px solid var(--border); border-radius: 6px; padding: 16px; background: #0c0c18; }
  .info-card h4 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .detail-level { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .dl-label { color: var(--text-dim); }
  .dl-value { font-weight: 600; }
  @media (max-width: 768px) { .info-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<nav id="nav"></nav>
<div class="container">
  <div class="page-header">
    <div>
      <h1>📐 Expected Moves</h1>
      <div class="subtitle">Options-implied weekly ranges · ATM straddle × 0.85</div>
    </div>
    <div class="updated" id="em-updated"></div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="legend">
    <span style="color:var(--text-dim);">Long Risk:</span>
    <div class="legend-item"><div class="legend-swatch" style="background:#1b5e20;"></div> Low (bottom of range)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#8bc34a;"></div> Moderate</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ffeb3b;"></div> Elevated</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ff9800;"></div> High</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f44336;"></div> Extended</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#b71c1c;"></div> Above EM</div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <div class="tier-tabs" style="margin-bottom:0;">
      <button class="tier-tab active" data-tier="weekly">Weekly</button>
      <button class="tier-tab" data-tier="daily">Daily</button>
      <button class="tier-tab" data-tier="monthly">Monthly</button>
      <button class="tier-tab" data-tier="quarterly">Quarterly</button>
    </div>
    <div class="tier-tabs" style="margin-bottom:0;">
      <button class="tier-tab filter-tab active" data-filter="all">All</button>
      <button class="tier-tab filter-tab" data-filter="indices">Indices</button>
      <button class="tier-tab filter-tab" data-filter="top10">Top 10 S&amp;P</button>
      <button class="tier-tab filter-tab" data-filter="watchlist">Watchlist</button>
    </div>
  </div>

  <div class="em-table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="symbol">Ticker</th>
          <th data-col="current">Price</th>
          <th data-col="change">Change</th>
          <th data-col="em">± EM</th>
          <th data-col="pct">EM %</th>
          <th data-col="lower">Low</th>
          <th data-col="upper">High</th>
          <th data-col="position" style="min-width:140px;">Position in Range</th>
          <th data-col="risk">Risk Level</th>
          <th data-col="riskbar" style="min-width:130px;">Risk Meter</th>
          <th data-col="bias">Bias</th>
        </tr>
      </thead>
      <tbody id="em-tbody"></tbody>
    </table>
  </div>
</div>

<!-- EM Detail Modal -->
<div class="modal-overlay" id="em-modal" onclick="if(event.target===this)closeEMDetail()">
  <div class="modal">
    <div class="modal-header">
      <div class="ticker-info">
        <span class="modal-ticker" id="em-modal-ticker"></span>
        <span class="modal-name" id="em-modal-name"></span>
        <span class="modal-price-tag" id="em-modal-price"></span>
        <span class="bias-badge" id="em-modal-bias"></span>
      </div>
      <button class="modal-close" onclick="closeEMDetail()">✕</button>
    </div>
    <div class="modal-body" id="em-modal-body"></div>
  </div>
</div>

<script src="bt-prices.js"></script>
<script>
let emData = {};
let watchlistData = [];
let currentTier = 'weekly';
let sortCol = null;
let currentFilter = 'all';
const TOP10_SP = ['AAPL','MSFT','NVDA','AMZN','META','GOOGL','GOOG','TSLA','BRK B','AVGO'];
const INDICES = ['SPX','SPY','QQQ','IWM','DIA','TLT','HYG','LQD','GLD','USO','UNG','IBIT'];
let sortAsc = false;

async function loadData() {
  try {
    const [emRes, wlRes] = await Promise.all([
      fetch('data/expected-moves.json'),
      fetch('data/watchlist.json'),
      btPrices.load()
    ]);
    const em = await emRes.json();
    emData = em;
    watchlistData = await wlRes.json();
    const updatedEl = document.getElementById('em-updated');
    const updatedDate = new Date(em.updated);
    const ageHours = (Date.now() - updatedDate.getTime()) / 3600000;
    let emLabel = `EM Ranges: ${updatedDate.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true, timeZone:'America/New_York' })} ET`;
    // Stale data warning: log only, no UI banner
    if (ageHours > 48) {
      updatedEl.style.color = 'var(--red)';
      emLabel += ` (${Math.round(ageHours / 24)}d old)`;
      console.warn(`[EM] Data stale: ${Math.round(ageHours)}h old. Run update-expected-moves.py to refresh.`);
    } else if (ageHours > 24) {
      updatedEl.style.color = 'var(--orange)';
      emLabel += ` (${Math.round(ageHours)}h ago)`;
      console.info(`[EM] Data age: ${Math.round(ageHours)}h`);
    }
    // Show prices freshness alongside EM ranges freshness
    const pricesLabel = btPrices.updatedAt() ? ` · Prices: ${btPrices.updatedLabel()}` : '';
    updatedEl.textContent = emLabel + pricesLabel;
    render();
  } catch(e) {
    console.error('Failed to load data:', e);
    document.getElementById('em-tbody').innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--red);padding:40px;">Failed to load expected move data</td></tr>';
  }
}

function getRiskColor(pct) {
  // pct = 0 (bottom of range) to 100 (top) to >100 (above)
  if (pct <= 20) return '#1b5e20';
  if (pct <= 40) return '#4caf50';
  if (pct <= 55) return '#8bc34a';
  if (pct <= 70) return '#ffeb3b';
  if (pct <= 85) return '#ff9800';
  if (pct <= 100) return '#f44336';
  return '#b71c1c';
}

function getRiskLabel(pct) {
  if (pct <= 20) return { text: 'LOW', color: '#1b5e20', bg: 'rgba(27,94,32,0.2)' };
  if (pct <= 40) return { text: 'LOW', color: '#4caf50', bg: 'rgba(76,175,80,0.15)' };
  if (pct <= 55) return { text: 'MODERATE', color: '#8bc34a', bg: 'rgba(139,195,74,0.15)' };
  if (pct <= 70) return { text: 'ELEVATED', color: '#ffeb3b', bg: 'rgba(255,235,59,0.15)' };
  if (pct <= 85) return { text: 'HIGH', color: '#ff9800', bg: 'rgba(255,152,0,0.15)' };
  if (pct <= 100) return { text: 'EXTENDED', color: '#f44336', bg: 'rgba(244,67,54,0.15)' };
  return { text: 'ABOVE EM', color: '#b71c1c', bg: 'rgba(183,28,28,0.2)' };
}

function buildRows() {
  const tickers = emData.tickers || {};
  const rows = [];

  for (const [sym, t] of Object.entries(tickers)) {
    const tier = t[currentTier] || {};
    if (!tier.upper || !tier.lower) continue;

    const wl = watchlistData.find(w => w.symbol === sym);
    const currentPrice = btPrices.price(sym) ?? wl?.price ?? t.close;
    const change = btPrices.change(sym) ?? wl?.change ?? 0;

    // Filter
    if (currentFilter === 'indices' && !INDICES.includes(sym)) continue;
    if (currentFilter === 'top10' && !TOP10_SP.includes(sym)) continue;
    if (currentFilter === 'watchlist' && !wl) continue;

    const lo = tier.lower;
    const hi = tier.upper;
    const range = hi - lo;

    // Position: 0% = at low, 100% = at high, >100% = above
    const position = range > 0 ? ((currentPrice - lo) / range) * 100 : 50;
    const clampedPos = Math.max(0, Math.min(100, position));

    const risk = getRiskLabel(position);
    const riskColor = getRiskColor(position);

    // Bias from watchlist
    let bias = null;
    let biasHtml = '<span style="color:var(--text-dim)">—</span>';
    if (wl) {
      bias = wl.bias;
      const above200 = wl.sma200 && currentPrice > wl.sma200;
      const above20  = wl.sma20  && currentPrice > wl.sma20;
      const biasColor = bias === 'bull' ? '#4caf50' : bias === 'bear' ? '#f44336' : '#aaa';
      const biasArrow = bias === 'bull' ? '▲' : bias === 'bear' ? '▼' : '—';
      const smaTag = above200
        ? `<span style="color:#4caf50;font-size:10px;margin-left:4px;">↑200</span>`
        : `<span style="color:#f44336;font-size:10px;margin-left:4px;">↓200</span>`;
      biasHtml = `<span style="color:${biasColor};font-weight:600;">${biasArrow} ${(bias||'').toUpperCase()}</span>${smaTag}`;
    }

    rows.push({
      symbol: sym,
      close: t.close,
      current: currentPrice,
      change: change,
      em: tier.value,
      pct: tier.pct,
      lower: lo,
      upper: hi,
      position: position,
      clampedPos: clampedPos,
      risk: risk,
      riskColor: riskColor,
      straddle: t.straddle,
      strike: t.strike,
      expiry: t.weekly_expiry,
      proxy: t.futures_proxy,
      biasHtml: biasHtml,
    });
  }

  return rows;
}

function render() {
  if (!emData.tickers) return;
  const rows = buildRows();
  sortRows(rows);
  renderStats(rows);
  renderTable(rows);
}

function renderStats(rows) {
  if (!rows.length) { document.getElementById('stats-row').innerHTML = ''; return; }

  const avgPct = rows.reduce((s, r) => s + (r.pct || 0), 0) / rows.length;
  const maxEM = rows.reduce((max, r) => (r.pct || 0) > (max.pct || 0) ? r : max, rows[0]);
  const minEM = rows.reduce((min, r) => (r.pct || 0) < (min.pct || 0) ? r : min, rows[0]);
  const extended = rows.filter(r => r.position > 85).length;
  const buyZone = rows.filter(r => r.position <= 20).length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Avg ${currentTier} EM</div>
      <div class="stat-value">${avgPct.toFixed(1)}%</div>
      <div class="stat-sub">${rows.length} tickers</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Highest EM</div>
      <div class="stat-value" style="color:var(--orange)">${maxEM.symbol}</div>
      <div class="stat-sub">±${maxEM.pct}% ($${maxEM.em})</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🟢 Buy Zone</div>
      <div class="stat-value" style="color:${buyZone > 0 ? '#4caf50' : 'var(--text-dim)'}">${buyZone}</div>
      <div class="stat-sub">near low of EM range</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🔴 Extended</div>
      <div class="stat-value" style="color:${extended > 0 ? 'var(--red)' : 'var(--text-dim)'}">${extended}</div>
      <div class="stat-sub">at/above EM ceiling</div>
    </div>
  `;
}

function renderTable(rows) {
  const tbody = document.getElementById('em-tbody');

  tbody.innerHTML = rows.map(r => {
    const chgClass = r.change >= 0 ? 'up' : 'down';
    const chgSign = r.change >= 0 ? '+' : '';
    const posBarColor = r.riskColor;
    const needlePct = Math.max(0, Math.min(100, r.position)).toFixed(1);

    // Needle color matches risk level
    const needleColor = r.riskColor;

    // Alert tags
    let alertTag = '';
    let rowClass = '';
    if (r.position <= 10) {
      alertTag = `<span class="alert-tag" style="color:#4caf50;background:rgba(76,175,80,0.2);border:1px solid #4caf5060;">🟢 AT SUPPORT</span>`;
      rowClass = 'alert-buy';
    } else if (r.position <= 20) {
      alertTag = `<span class="alert-tag" style="color:#8bc34a;background:rgba(139,195,74,0.15);border:1px solid #8bc34a50;">💚 NEAR LOW</span>`;
      rowClass = 'alert-buy';
    } else if (r.position < 0) {
      alertTag = `<span class="alert-tag" style="color:#00e676;background:rgba(0,230,118,0.15);border:1px solid #00e67660;">⚡ BELOW EM</span>`;
      rowClass = 'alert-buy';
    } else if (r.position >= 100) {
      alertTag = `<span class="alert-tag" style="color:#f44336;background:rgba(244,67,54,0.15);border:1px solid #f4433660;">🔴 ABOVE EM</span>`;
      rowClass = 'alert-sell';
    } else if (r.position >= 90) {
      alertTag = `<span class="alert-tag" style="color:#ff5722;background:rgba(255,87,34,0.15);border:1px solid #ff572260;">⚠️ AT CEILING</span>`;
      rowClass = 'alert-sell';
    }

    return `<tr class="${rowClass}" onclick="openEMDetail('${r.symbol}')">
      <td class="ticker-cell">${r.symbol}${r.proxy ? ` <span class="dim">(${r.proxy.futures})</span>` : ''} ${alertTag}</td>
      <td>$${r.current.toFixed(2)}</td>
      <td class="${chgClass}">${chgSign}${r.change.toFixed(2)}%</td>
      <td>±$${r.em}</td>
      <td style="color:var(--orange)">±${r.pct}%</td>
      <td style="color:var(--cyan)">$${r.lower.toFixed(2)}</td>
      <td style="color:var(--red)">$${r.upper.toFixed(2)}</td>
      <td>
        <div class="pos-bar">
          <div class="pos-fill" style="width:${r.clampedPos}%;background:${posBarColor};opacity:0.3;"></div>
          <div class="pos-marker" style="left:${r.clampedPos}%;"></div>
        </div>
        <div class="dim" style="margin-top:3px;">${r.position.toFixed(0)}% of range</div>
      </td>
      <td><span class="risk-badge" style="color:${r.risk.color};background:${r.risk.bg};border:1px solid ${r.risk.color}40;">${r.risk.text}</span></td>
      <td>
        <div class="risk-bar-wrap">
          <div class="risk-fill" style="width:${Math.max(4, Math.min(100, r.position))}%;background:${needleColor};"></div>
        </div>
      </td>
      <td style="white-space:nowrap;">${r.biasHtml}</td>
    </tr>`;
  }).join('');
}

function sortRows(rows) {
  if (!sortCol) return; // No sort active — keep default data order
  const col = sortCol;
  rows.sort((a, b) => {
    let va, vb;
    switch(col) {
      case 'symbol': va = a.symbol; vb = b.symbol; break;
      case 'current': va = a.current; vb = b.current; break;
      case 'change': va = a.change; vb = b.change; break;
      case 'em': va = parseFloat(a.em)||0; vb = parseFloat(b.em)||0; break;
      case 'pct': va = a.pct||0; vb = b.pct||0; break;
      case 'lower': va = a.lower; vb = b.lower; break;
      case 'upper': va = a.upper; vb = b.upper; break;
      case 'position': va = a.position; vb = b.position; break;
      case 'risk': va = a.position; vb = b.position; break;
      case 'riskbar': va = a.position; vb = b.position; break;
      default: va = a.position; vb = b.position;
    }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
}

// Sortable headers — 3-state cycle: asc → desc → none
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sort-asc','sort-desc'));
    if (sortCol === col) {
      if (sortAsc) {
        // Was asc → go desc
        sortAsc = false;
        th.classList.add('sort-desc');
      } else {
        // Was desc → clear sort (none)
        sortCol = null;
        sortAsc = false;
      }
    } else {
      // New column → start asc
      sortCol = col;
      sortAsc = true;
      th.classList.add('sort-asc');
    }
    render();
  });
});

function openEMDetail(symbol) {
  const t = emData.tickers?.[symbol];
  const wl = watchlistData.find(w => w.symbol === symbol);
  const isExternal = !t;

  const price = btPrices.price(symbol) ?? wl?.price ?? t?.close ?? null;
  const change = btPrices.change(symbol) ?? wl?.change ?? 0;
  const chgClass = change >= 0 ? 'up' : 'down';
  const chgSign = change >= 0 ? '+' : '';
  const bias = wl?.bias || null;
  const exchange = EXCHANGE_MAP[symbol] || 'NYSE';
  const tvSymbol = `${exchange}:${symbol}`;

  document.getElementById('em-modal-ticker').textContent = symbol;
  document.getElementById('em-modal-name').textContent = isExternal
    ? 'External Ticker · TradingView Data'
    : (wl ? `${wl.name || ''} · ${wl.sector || ''}` : '');
  document.getElementById('em-modal-price').innerHTML = price
    ? `<span class="${chgClass}">$${price.toFixed(2)}</span>` +
      ` <span class="${chgClass}" style="font-size:12px">${chgSign}${Math.abs(change).toFixed(2)}%</span>`
    : '<span style="color:var(--text-dim)">—</span>';
  const biasEl = document.getElementById('em-modal-bias');
  if (bias) { biasEl.className = `bias-badge ${bias}`; biasEl.textContent = bias.toUpperCase(); biasEl.style.display=''; }
  else if (isExternal) { biasEl.className = 'bias-badge'; biasEl.textContent = 'EXTERNAL'; biasEl.style.display=''; biasEl.style.background='rgba(255,167,38,0.15)'; biasEl.style.color='var(--orange)'; }
  else { biasEl.style.display = 'none'; }

  if (isExternal) {
    // External ticker — TradingView chart only
    document.getElementById('em-modal-body').innerHTML = `
      <div class="chart-box">
        <div class="chart-label">${symbol} — Daily Chart</div>
        <div id="em-tv-chart"></div>
      </div>
      <div style="text-align:center;padding:16px;color:var(--text-dim);font-size:12px;">
        Not in watchlist · No expected move data · <a href="https://www.tradingview.com/symbols/${symbol}/" target="_blank" style="color:var(--cyan);">Open on TradingView ↗</a>
      </div>`;
  } else {
    // Tracked ticker — tier cards + chart
    const tiers = [
    ['Daily',    t.daily],
    ['Weekly',   t.weekly],
    ['Monthly',  t.monthly],
    ['Quarterly',t.quarterly],
  ].filter(([, d]) => d?.upper);

  const tierCards = tiers.map(([label, d]) => {
    const pos = d.upper > d.lower ? ((price - d.lower) / (d.upper - d.lower)) * 100 : 50;
    const clampedPos = Math.max(0, Math.min(100, pos));
    const riskColor = getRiskColor(pos);
    const riskText = getRiskLabel(pos).text;
    return `<div class="info-card">
      <h4>${label}</h4>
      <div class="detail-level"><span class="dl-label">EM ±</span><span class="dl-value">$${d.value} (${d.pct}%)</span></div>
      <div class="detail-level"><span class="dl-label">Low</span><span class="dl-value" style="color:var(--cyan)">$${d.lower.toFixed(2)}</span></div>
      <div class="detail-level"><span class="dl-label">High</span><span class="dl-value" style="color:var(--red)">$${d.upper.toFixed(2)}</span></div>
      <div class="detail-level"><span class="dl-label">Position</span><span class="dl-value" style="color:${riskColor}">${pos.toFixed(0)}%</span></div>
      <div class="pos-bar" style="margin-top:8px;">
        <div class="pos-fill" style="width:${clampedPos}%;background:${riskColor};opacity:0.3;"></div>
        <div class="pos-marker" style="left:${clampedPos}%;"></div>
      </div>
      <div style="margin-top:4px;font-size:11px;color:${riskColor}">${riskText}</div>
    </div>`;
  }).join('');

    document.getElementById('em-modal-body').innerHTML = `
      <div class="chart-box">
        <div class="chart-label">${symbol} — Daily Chart</div>
        <div id="em-tv-chart"></div>
      </div>
      <div class="info-row">${tierCards}</div>`;
  }

  // Inject TradingView widget
  document.getElementById('em-tv-chart').innerHTML = '';
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  s.async = true;
  s.innerHTML = JSON.stringify({
    autosize: true, height: 400, symbol: tvSymbol,
    interval: 'D', timezone: 'America/New_York',
    theme: 'dark', style: '1', locale: 'en',
    hide_top_toolbar: false, hide_legend: false,
    allow_symbol_change: false, save_image: false,
  });
  document.getElementById('em-tv-chart').appendChild(s);

  document.getElementById('em-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEMDetail() {
  document.getElementById('em-modal').classList.remove('open');
  document.body.style.overflow = '';
}
