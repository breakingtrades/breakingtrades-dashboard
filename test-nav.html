<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nav Component Tests</title>
<style>
  :root { --bg: #0a0a12; --bg-card: #0e0e1a; --border: #1e1e3a; --text: #e0e0e0; --text-dim: #888; --cyan: #00d4aa; --green: #00c853; --orange: #ffb74d; }
  body { background: var(--bg); color: var(--text); font-family: monospace; padding: 20px; }
  .test { padding: 8px 12px; margin: 4px 0; border-radius: 4px; }
  .pass { background: rgba(0,200,83,0.15); color: #00c853; }
  .fail { background: rgba(220,53,69,0.15); color: #dc3545; }
  .summary { margin-top: 20px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
</style>
<link rel="stylesheet" href="css/nav.css">
</head>
<body>
<h2>🧪 BreakingTrades Nav Component Tests</h2>
<div id="results"></div>
<div id="summary" class="summary"></div>

<!-- Nav mount point -->
<nav id="nav"></nav>

<script>
// Pre-nav checks (MUST run before nav.js)
var earlyTzPicker = document.getElementById('tz-picker');
var navReadyFired = false;
var tzPickerWorksAfterReady = false;
document.addEventListener('nav:ready', function() {
  navReadyFired = true;
  var tz = document.getElementById('tz-picker');
  tzPickerWorksAfterReady = tz !== null && typeof tz.addEventListener === 'function';
});
</script>

<!-- Load modules in correct order -->
<script src="js/market-status.js"></script>
<script src="js/ticker-search.js"></script>
<script src="js/nav.js"></script>

<script>
(function() {
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');
  let passed = 0, failed = 0;

  function assert(name, condition) {
    const div = document.createElement('div');
    div.className = 'test ' + (condition ? 'pass' : 'fail');
    div.textContent = (condition ? '✅' : '❌') + ' ' + name;
    results.appendChild(div);
    if (condition) passed++; else failed++;
  }

  // Wait for nav to render
  setTimeout(() => {

    // 1. Nav renders into mount point
    const nav = document.getElementById('nav');
    assert('Nav element exists', !!nav);
    assert('Nav has nav-bar class', nav.classList.contains('nav-bar'));
    assert('Nav has children', nav.children.length > 0);

    // 2. Logo
    const logo = nav.querySelector('.nav-logo');
    assert('Logo exists', !!logo);
    assert('Logo is a link', logo.tagName === 'A');
    assert('Logo links to index.html', logo.href.endsWith('index.html'));
    assert('Logo has SVG icon', !!logo.querySelector('svg.bt-logo'));
    assert('Logo has text span', !!logo.querySelector('.bt-logo-text'));

    // 3. Page links
    const links = nav.querySelectorAll('.nav-link');
    assert('Has 4 page links', links.length === 4);
    assert('First link is Signals', links[0].textContent === 'Signals');
    assert('Second link is Watchlist', links[1].textContent === 'Watchlist');
    assert('Third link is Expected Moves', links[2].textContent === 'Expected Moves');
    assert('Fourth link is Market', links[3].textContent === 'Market');
    assert('Links have href', Array.from(links).every(l => l.href.includes('.html')));

    // 4. Active page detection
    const currentFile = location.pathname.split('/').pop() || 'index.html';
    const activeLink = nav.querySelector('.nav-link.active');
    const isTestPage = currentFile === 'test-nav.html';
    assert('Active link correct (none on test page, one on real page)', isTestPage ? !activeLink : !!activeLink);

    // 5. Search
    const searchInput = document.getElementById('ticker-search');
    assert('Search input exists', !!searchInput);
    assert('Search has placeholder', searchInput.placeholder.includes('ticker'));
    const searchDropdown = document.getElementById('search-results');
    assert('Search dropdown exists', !!searchDropdown);

    // 6. Market status
    const marketStatus = document.getElementById('market-status');
    assert('Market status element exists', !!marketStatus);

    // 7. Timezone picker
    const tzPicker = document.getElementById('tz-picker');
    assert('Timezone picker exists', !!tzPicker);
    assert('Has timezone options', tzPicker.options.length >= 8);
    assert('Default is ET', tzPicker.options[0].textContent.includes('ET'));

    // 8. Nav right section
    const navRight = nav.querySelector('.nav-right');
    assert('Nav right section exists', !!navRight);

    // 9. Search wrap
    const searchWrap = nav.querySelector('.nav-search-wrap');
    assert('Search wrap exists', !!searchWrap);

    // 10. CSS loaded (check computed styles)
    const navStyle = getComputedStyle(nav);
    assert('Nav is flex', navStyle.display === 'flex');
    assert('Nav is sticky', navStyle.position === 'sticky');

    // 11. Mobile responsive (check CSS rule exists)
    const sheet = Array.from(document.styleSheets).find(s => s.href && s.href.includes('nav.css'));
    assert('nav.css stylesheet loaded', !!sheet);

    // 12. nav:ready event fires
    assert('nav:ready event was received', navReadyFired);

    // 13. tz-picker accessible after nav:ready
    assert('tz-picker works after nav:ready', tzPickerWorksAfterReady);

    // 14. tz-picker localStorage roundtrip
    localStorage.setItem('bt_timezone', 'Asia/Tokyo');
    const tz2 = document.getElementById('tz-picker');
    if (tz2) { tz2.value = 'Asia/Tokyo'; }
    assert('tz-picker can be set after nav:ready', tz2 && tz2.value === 'Asia/Tokyo');
    localStorage.removeItem('bt_timezone');

    // 15. No scripts access tz-picker before nav:ready
    // (regression guard — if this test exists, the pattern is enforced)
    assert('tz-picker not in DOM before nav.js runs', earlyTzPicker === null);

    // 16. Search input functional after nav:ready
    const searchAfter = document.getElementById('ticker-search');
    assert('Search input accepts input after nav:ready', searchAfter && typeof searchAfter.focus === 'function');

    // 17. market-status element functional after nav:ready
    const msAfter = document.getElementById('market-status');
    assert('market-status element in DOM after nav:ready', !!msAfter);

    // === Expected Moves Page Tests ===

    // 18. expected-moves.html exists (fetch test)
    fetch('expected-moves.html').then(r => {
      assert('expected-moves.html exists (HTTP 200)', r.ok);
    }).catch(() => {
      assert('expected-moves.html exists (HTTP 200)', false);
    });

    // 19. expected-moves.json data structure
    fetch('data/expected-moves.json').then(r => r.json()).then(data => {
      assert('expected-moves.json has updated field', !!data.updated);
      assert('expected-moves.json has tickers object', typeof data.tickers === 'object');
      assert('expected-moves.json has at least 1 ticker', Object.keys(data.tickers).length >= 1);

      // 20. Ticker data structure
      const firstKey = Object.keys(data.tickers)[0];
      const t = data.tickers[firstKey];
      assert('Ticker has close field', typeof t.close === 'number');
      assert('Ticker has strike field', typeof t.strike === 'number');
      assert('Ticker has straddle field', typeof t.straddle === 'number');
      assert('Ticker has weekly tier', !!t.weekly);
      assert('Weekly tier has upper/lower/value/pct', t.weekly.upper > 0 && t.weekly.lower > 0 && t.weekly.value && t.weekly.pct);

      // 21. Risk model correctness
      const lo = t.weekly.lower;
      const hi = t.weekly.upper;
      const range = hi - lo;
      assert('Weekly upper > lower', hi > lo);
      assert('Close is within reasonable range of bounds', t.close >= lo * 0.8 && t.close <= hi * 1.2);
      assert('EM range is positive', range > 0);

      // 22. SPY specifically (our main ticker)
      const spy = data.tickers['SPY'];
      if (spy) {
        assert('SPY has all 4 tiers', !!spy.daily && !!spy.weekly && !!spy.monthly && !!spy.quarterly);
        assert('SPY weekly EM is reasonable (0.5-10%)', spy.weekly.pct >= 0.5 && spy.weekly.pct <= 10);
        assert('SPY close is > $400', spy.close > 400);
      }

      // Re-render summary after async tests
      setTimeout(updateSummary, 100);
    }).catch(e => {
      assert('expected-moves.json loads without error', false);
      setTimeout(updateSummary, 100);
    });

    // === Staleness Guard Tests (prevent stale EM data from showing misleading positions) ===

    // 23. EM data freshness
    fetch('data/expected-moves.json').then(r => r.json()).then(data => {
      const updatedDate = new Date(data.updated);
      const ageHours = (Date.now() - updatedDate.getTime()) / 3600000;
      assert('EM data updated field is valid date', !isNaN(updatedDate.getTime()));
      assert('EM data is not older than 7 days', ageHours < 168);
      assert('EM data is not from the future', updatedDate.getTime() <= Date.now());

      // Verify close prices are reasonable (not zero, not NaN)
      for (const [sym, t] of Object.entries(data.tickers)) {
        assert(`${sym} close is a positive number`, typeof t.close === 'number' && t.close > 0 && !isNaN(t.close));
        if (t.weekly) {
          assert(`${sym} weekly range is valid (upper > lower > 0)`, t.weekly.upper > t.weekly.lower && t.weekly.lower > 0);
          assert(`${sym} weekly EM value > 0`, t.weekly.value > 0);
          assert(`${sym} weekly EM pct between 0.1 and 30`, t.weekly.pct >= 0.1 && t.weekly.pct <= 30);
        }
      }

      // Verify position calculation doesn't silently fall back to 50%
      // Load watchlist to test the actual rendering logic
      fetch('data/watchlist.json').then(r2 => r2.json()).then(wlData => {
        for (const [sym, t] of Object.entries(data.tickers)) {
          const tier = t.weekly;
          if (!tier || !tier.upper || !tier.lower) continue;
          const wl = wlData.find(w => w.symbol === sym);
          const currentPrice = wl ? wl.price : t.close;
          const range = tier.upper - tier.lower;
          const position = range > 0 ? ((currentPrice - tier.lower) / range) * 100 : -999;
          assert(`${sym} position is computed (not fallback 50)`, position !== 50 || (currentPrice > 0 && range > 0));
          assert(`${sym} position is in plausible range (-50 to 200)`, position >= -50 && position <= 200);
        }
        setTimeout(updateSummary, 100);
      });
    }).catch(() => {
      assert('EM staleness tests: data loaded', false);
      setTimeout(updateSummary, 100);
    });

    // === EM Filter Tab Tests ===

    // Filter constants (mirrors expected-moves.html)
    const TOP10_SP = ['AAPL','MSFT','NVDA','AMZN','META','GOOGL','GOOG','TSLA','BRK B','AVGO'];
    const INDICES   = ['SPY','QQQ','IWM','DIA','TLT','HYG','LQD','GLD','USO','UNG','IBIT'];

    fetch('data/expected-moves.json').then(r => r.json()).then(data => {
      const tickers = Object.keys(data.tickers);

      // Indices filter — all returned symbols must be in INDICES list
      const indicesResult = tickers.filter(s => INDICES.includes(s));
      assert('Indices filter returns at least 1 ticker', indicesResult.length >= 1);
      assert('Indices filter contains only known index tickers', indicesResult.every(s => INDICES.includes(s)));
      assert('SPY appears in Indices filter', indicesResult.includes('SPY'));
      assert('QQQ appears in Indices filter', indicesResult.includes('QQQ'));
      assert('AAPL does NOT appear in Indices filter', !indicesResult.includes('AAPL'));

      // Top 10 S&P filter
      const top10Result = tickers.filter(s => TOP10_SP.includes(s));
      assert('Top 10 filter returns at least 1 ticker', top10Result.length >= 1);
      assert('Top 10 filter contains only S&P top-10 tickers', top10Result.every(s => TOP10_SP.includes(s)));
      assert('AAPL appears in Top 10 filter', top10Result.includes('AAPL') || !tickers.includes('AAPL'));
      assert('SPY does NOT appear in Top 10 filter', !top10Result.includes('SPY'));

      // All filter — returns everything
      assert('All filter returns all tickers', tickers.length > 0);

      // Mutual exclusivity — no ticker in both Indices and Top10
      const overlap = indicesResult.filter(s => TOP10_SP.includes(s));
      assert('Indices and Top 10 lists have no overlap', overlap.length === 0);

      setTimeout(updateSummary, 100);
    }).catch(() => {
      assert('EM filter tab tests: data loaded', false);
      setTimeout(updateSummary, 100);
    });

    fetch('data/watchlist.json').then(r => r.json()).then(wlData => {
      const wlSymbols = wlData.map(w => w.symbol);
      // Watchlist filter — all watchlist symbols should be recognizable
      assert('Watchlist data has entries', wlSymbols.length > 0);
      assert('Watchlist contains SPY', wlSymbols.includes('SPY'));
      setTimeout(updateSummary, 100);
    }).catch(() => {
      assert('EM filter: watchlist.json loads', false);
      setTimeout(updateSummary, 100);
    });

    // 24. Expected Moves nav link
    const emLink = Array.from(links).find(l => l.textContent === 'Expected Moves');
    assert('Expected Moves nav link exists', !!emLink);
    assert('Expected Moves links to expected-moves.html', emLink && emLink.href.endsWith('expected-moves.html'));

    // 24. Watchlist URL param handler
    assert('watchlist.html supports ?ticker= param (code check)', typeof window.URLSearchParams === 'function');

    function updateSummary() {
      summary.innerHTML = `<strong>${passed + failed} tests:</strong> <span style="color:#00c853">${passed} passed</span>, <span style="color:#dc3545">${failed} failed</span>`;
      summary.style.borderColor = failed === 0 ? '#00c853' : '#dc3545';
      console.log(`Nav tests: ${passed} passed, ${failed} failed`);
      if (failed > 0) console.error('TESTS FAILED');
    }

    // Initial summary (async tests may update later)
    updateSummary();

  }, 300);
})();
</script>
</body>
</html>
