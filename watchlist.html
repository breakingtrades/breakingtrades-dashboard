    --border: #1e1e3a;
    --text: #e0e0e8;

    --text-bright: #ffffff;
    --cyan: #00d4aa;
    --orange: #ffa726;
    --red: #ef5350;
    --gold: #ffd700;
    --blue: #42a5f5;
    --purple: #ab47bc;
    --yellow: #ffeb3b;
  }
  /* Expected Move Bands */
  .em-banner {
    margin-bottom: 16px;
    padding: 16px 20px;
    border-radius: 8px;
    background: rgba(0, 212, 170, 0.05);
    border: 1px solid rgba(0, 212, 170, 0.15);
  }
  .em-banner h4 { margin-bottom: 12px; font-size: 13px; color: var(--cyan); }
  .em-band-visual {
    position: relative;
    height: 56px;
    margin: 12px 0 8px;
    background: linear-gradient(90deg, rgba(239,83,80,0.12) 0%, rgba(0,212,170,0.08) 50%, rgba(239,83,80,0.12) 100%);
    border-radius: 6px;
    overflow: hidden;
  }
  .em-band-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
  }
  .em-band-line.low { background: var(--red); }
  .em-band-line.mid { background: var(--text-dim); border-style: dashed; width: 1px; opacity: 0.5; }
  .em-band-line.high { background: var(--cyan); }
  .em-band-line.current { background: var(--gold); width: 3px; z-index: 2; }
  .em-band-label {
    position: absolute;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .em-band-label.top { top: 2px; }
  .em-band-label.bottom { bottom: 2px; }
  .em-tiers {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .em-tier {
    text-align: center;
    padding: 8px 4px;
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
  }
  .em-tier .tier-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .em-tier .tier-value { font-size: 15px; font-weight: 700; color: var(--text-bright); margin: 4px 0 2px; }
  .em-tier .tier-pct { font-size: 11px; color: var(--orange); }
  .em-tier .tier-range { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .em-tier.active { border-color: var(--cyan); background: rgba(0,212,170,0.06); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .up { color: var(--cyan); }
  .down { color: var(--red); }
  .neutral { color: var(--text-dim); }
  .timestamp { color: var(--text-dim); font-size: 11px; }

  /* === MACRO STRIP === */

    font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
  }
  .vix-backwardation { background: rgba(239,83,80,0.1); color: var(--red); }

  /* === MAIN CONTENT === */
  .page-content {
    padding: 20px 24px;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .page-title {
    font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--cyan); font-weight: 600;
  }
  .view-toggle {
    display: flex; gap: 2px; background: var(--bg-card); border-radius: 4px; overflow: hidden;
  }
  .view-btn {
    padding: 6px 14px; background: none; border: none; color: var(--text-dim);
    font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--cyan); color: var(--bg-primary); }

  /* === TV WIDGET === */
  .tv-widget-wrap {
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
    background: var(--bg-card); margin-bottom: 24px;
  }

  /* === TABLE VIEW === */
  .watchlist-table-wrap {
    display: none; overflow-x: auto;
  }
  .watchlist-table {
    width: 100%; border-collapse: collapse;

    padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
    background: #0c0c18; position: sticky; top: 48px; z-index: 10;

  .watchlist-table th:hover { color: var(--cyan); }

  .watchlist-table td {

  .watchlist-table .sector-cell { color: var(--text-dim); font-size: 11px; }
  .bias-badge {

  .bias-badge.bull { background: rgba(0,212,170,0.15); color: var(--cyan); }
  .bias-badge.bear { background: rgba(239,83,80,0.15); color: var(--red); }
  .bias-badge.mixed { background: rgba(255,167,38,0.15); color: var(--orange); }
  .status-badge {

<script>
// === WATCHLIST DATA ===
let watchlist = [];

async function loadWatchlist() {
  try {
    const res = await fetch('data/watchlist.json');
    watchlist = await res.json();
    renderTable();
    // Auto-open detail if ?ticker= param
    const urlTicker = new URLSearchParams(window.location.search).get('ticker');
    if (urlTicker) {
      await loadExpectedMoves();
      openDetail(urlTicker.toUpperCase());
    }
  } catch (err) {
    console.error("Failed to load watchlist data:", err);
    document.getElementById('wl-tbody').innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--red);">Error loading live data. Please check back later.</td></tr>';
  }
}

// === VIEW TOGGLE ===
function showView(view) {
  document.getElementById('tv-widget-view').style.display = view === 'widget' ? 'block' : 'none';
  document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';
  document.getElementById('btn-widget').classList.toggle('active', view === 'widget');
  document.getElementById('btn-table').classList.toggle('active', view === 'table');
}

// === RENDER TABLE ===
let sortCol = 0, sortAsc = true;
function renderTable() {
  const sorted = [...watchlist].sort((a, b) => {
    const keys = ['symbol','name','sector','price','change','sma20','sma50','bias','status'];
    const key = keys[sortCol];
    let va = a[key], vb = b[key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('wl-tbody').innerHTML = sorted.map(s => {
    const chgClass = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'neutral';
    const dist20 = ((s.price - s.sma20) / s.sma20 * 100).toFixed(1);
    const dist50 = ((s.price - s.sma50) / s.sma50 * 100).toFixed(1);
    const d20Class = dist20 > 0 ? 'up' : 'down';
    const d50Class = dist50 > 0 ? 'up' : 'down';
    return `<tr onclick="openDetail('${s.symbol}')" style="cursor:pointer;">
      <td class="ticker-cell">${s.symbol}</td>
      <td style="color:var(--text-dim);font-size:11px;">${s.name}</td>
      <td class="sector-cell">${s.sector}</td>
      <td>$${s.price.toFixed(2)}</td>
      <td class="${chgClass}">${s.change > 0 ? '+' : ''}${s.change.toFixed(1)}%</td>
      <td><span class="${d20Class}">${dist20 > 0 ? '+' : ''}${dist20}%</span> <span style="color:var(--text-dim);font-size:10px;">($${s.sma20.toFixed(0)})</span></td>
      <td><span class="${d50Class}">${dist50 > 0 ? '+' : ''}${dist50}%</span> <span style="color:var(--text-dim);font-size:10px;">($${s.sma50.toFixed(0)})</span></td>
      <td><span class="bias-badge ${s.bias}">${s.bias.toUpperCase()}</span></td>
      <td><span class="status-badge ${s.status}">${s.status.toUpperCase()}</span></td>
    </tr>`;
  }).join('');
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

// === TIMEZONE ===
const TZ_LABELS = {
  'America/New_York':'ET','America/Chicago':'CT','America/Los_Angeles':'PT',
  'Europe/London':'GMT','Europe/Berlin':'CET','Asia/Jerusalem':'IST',
  'Asia/Tokyo':'JST','Australia/Sydney':'AEST','UTC':'UTC'
};
function initTimezone() {
  const tz = document.getElementById('tz-picker');
  if (!tz) return;
  const saved = localStorage.getItem('bt_timezone');
  if (saved) tz.value = saved;
  tz.addEventListener('change', e => {
    localStorage.setItem('bt_timezone', e.target.value);
    updateTimestamp();
  });
  updateTimestamp();
  setInterval(updateTimestamp, 60000);
}
function updateTimestamp() {
  // Timestamp now handled by market-status.js
}

  'META':'NASDAQ','COIN':'NASDAQ','ARM':'NASDAQ','DELL':'NYSE','TSLA':'NASDAQ','NFLX':'NASDAQ',
  'AMD':'NASDAQ','AVGO':'NASDAQ','MU':'NASDAQ','QCOM':'NASDAQ','AMAT':'NASDAQ','LRCX':'NASDAQ',
  'MRVL':'NASDAQ','CRDO':'NASDAQ','ANET':'NYSE','VRT':'NYSE','CIEN':'NYSE','APH':'NYSE',
  'ADSK':'NASDAQ','CHTR':'NASDAQ','TMUS':'NASDAQ',
  'SPY':'AMEX','QQQ':'NASDAQ','IWM':'AMEX','DIA':'AMEX','HYG':'AMEX','TLT':'NASDAQ',
  'XLU':'AMEX','XLK':'AMEX','XLE':'AMEX','XLV':'AMEX','XLF':'AMEX','XLP':'AMEX',
  'XLY':'AMEX','XLI':'AMEX','XLC':'AMEX','XLRE':'AMEX','RSP':'AMEX','IGV':'AMEX',

function getExchange(sym) { return EXCHANGE_MAP[sym] || 'NYSE'; }

// === DETAIL MODAL ===
function openDetail(symbol) {
  const t = watchlist.find(x => x.symbol === symbol);
  if (!t) return;

  const modal = document.getElementById('modal');
  const exchange = getExchange(symbol);
  const pc = (t.change || 0) >= 0 ? 'up' : 'down';

  document.getElementById('modal-ticker').textContent = t.symbol;
  document.getElementById('modal-name').textContent = `${t.name || ''} · ${t.sector || ''}`;
  document.getElementById('modal-price').innerHTML =
    `<span class="${pc}">$${t.price?.toFixed(2) || '—'}</span>` +
    ` <span class="${pc}" style="font-size:12px">${(t.change||0) >= 0 ? '▲' : '▼'} ${Math.abs(t.change||0).toFixed(2)}%</span>`;
  document.getElementById('modal-bias').className = `bias-badge ${t.bias || 'mixed'}`;
  document.getElementById('modal-bias').textContent = (t.bias || 'mixed').toUpperCase();

  const tz = document.getElementById('tz-picker')?.value || 'America/New_York';
  const tvSymbol = `${exchange}:${symbol}`;

  // Build key levels
  const levels = [
    ['SMA 20', t.sma20],
    ['SMA 50', t.sma50],
    ['SMA 200', t.sma200],
    ['Weekly 20', t.w20],
    ['52w High', t.high52w],
    ['52w Low', t.low52w],
  ].filter(([_, v]) => v != null);

  const levelsHTML = levels.map(([label, val]) => {
    let color = 'var(--text)';
    if (label === '52w High') color = 'var(--cyan)';
    if (label === '52w Low') color = 'var(--red)';
    return `<div class="detail-level"><span class="dl-label">${label}</span><span class="dl-value" style="color:${color}">$${val.toFixed(2)}</span></div>`;
  }).join('');

  // Build volatility card
  const volItems = [
    ['RSI (14)', t.rsi != null ? `${t.rsi}${t.rsi > 70 ? ' OB <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>' : t.rsi < 30 ? ' OS <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' : ''}` : '—',
      t.rsi > 70 ? 'color:var(--red)' : t.rsi < 30 ? 'color:var(--cyan)' : ''],
    ['<span title="Average True Range — measures volatility based on the stock\'s price range over 14 periods">ATR (14)</span>', t.atr != null ? `$${t.atr.toFixed(2)}` : '—', ''],
    ['<span title="ATR as a percentage of the stock price — normalizes volatility for comparison across different price levels">ATR %</span>', t.atrPct != null ? `${t.atrPct}%` : '—', ''],
    ['Vol Rating', t.volRating || '—', ''],
    ['Volume', t.volume != null ? fmtVol(t.volume) : '—', ''],
    ['vs 20d Avg', t.volumeRatio != null ? `${t.volumeRatio}x` : '—',
      t.volumeRatio > 1.5 ? 'color:var(--cyan)' : t.volumeRatio < 0.6 ? 'color:var(--red)' : ''],
    ['BB Width %ile', t.bbWidthPercentile != null ? `${t.bbWidthPercentile}th` : '—',
      t.bbWidthPercentile < 15 ? 'color:var(--orange)' : ''],
    ['From 52w High', t.pctFrom52wHigh != null ? `${t.pctFrom52wHigh.toFixed(1)}%` : '—',
      (t.pctFrom52wHigh||0) < -20 ? 'color:var(--red)' : (t.pctFrom52wHigh||0) < -10 ? 'color:var(--orange)' : ''],
  ];
  const volHTML = volItems.map(([label, val, style]) =>
    `<div class="detail-level"><span class="dl-label">${label}</span><span class="dl-value"${style ? ` style="${style}"` : ''}>${val}</span></div>`
  ).join('');

  // Generate technical signals
  const signals = generateSignals(t);
  const signalsHTML = signals.map(s =>
    `<div class="signal-item ${s.cls}">${s.icon} ${s.text}</div>`
  ).join('') || '<div class="signal-item signal-neutral">No notable signals</div>';

  // Earnings banner
  const earningsHTML = t.earningsDays != null ?
    `<div style="margin-bottom:16px;padding:10px 16px;border-radius:6px;border:1px solid ${t.earningsDays <= 14 ? 'var(--red)' : 'var(--orange)'};background:${t.earningsDays <= 14 ? 'rgba(239,83,80,0.1)' : 'rgba(255,167,38,0.08)'};">
      <span style="font-size:12px;font-weight:600;color:${t.earningsDays <= 14 ? 'var(--red)' : 'var(--orange)'};">
        📅 Earnings: ${t.earningsDate} (${t.earningsDays} day${t.earningsDays !== 1 ? 's' : ''})
      </span>
    </div>` : '';

  // Build Expected Move card
  const emHTML = buildExpectedMoveHTML(symbol, t.price);

  document.getElementById('modal-body').innerHTML = `
    ${earningsHTML}
    ${emHTML}
    <div class="chart-row">
      <div class="chart-box">
        <div class="chart-label">Daily</div>
        <div id="modal-chart-daily" style="height:400px;"></div>
      </div>
      <div class="chart-box">
        <div class="chart-label">Weekly</div>
        <div id="modal-chart-weekly" style="height:400px;"></div>
      </div>
    </div>

    <div class="info-row">
      <div class="info-card">
        <h4>Technical Analysis</h4>
        <div id="modal-ta-widget" style="height:280px;"></div>
      </div>
      <div class="info-card">
        <h4>Key Levels</h4>
        ${levelsHTML}
      </div>
      <div class="info-card">
        <h4>Volatility & Volume</h4>
        ${volHTML}
      </div>
    </div>

    <div class="signals-section">
      <h4><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Technical Signals</h4>
      ${signalsHTML}
    </div>
  `;

  // Embed TradingView Advanced Charts
  embedTVChart('modal-chart-daily', tvSymbol, 'D', tz);
  embedTVChart('modal-chart-weekly', tvSymbol, 'W', tz);
  embedTAWidget('modal-ta-widget', tvSymbol);

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  // Clean up iframes
  ['modal-chart-daily','modal-chart-weekly','modal-ta-widget'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

function embedTVChart(containerId, symbol, interval, tz) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    "symbol": symbol,
    "interval": interval,
    "timezone": tz,
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "backgroundColor": "#0a0a0f",
    "gridColor": "rgba(255,255,255,0.03)",
    "hide_side_toolbar": false,
    "allow_symbol_change": false,
    "calendar": true,
    "support_host": "https://www.tradingview.com",
    "studies": [
      "STD;SMA@tv-basicstudies|20",
      "STD;SMA@tv-basicstudies|50"
    ],
    "width": "100%",
    "height": "100%"
  });
  const wrapper = document.createElement('div');
  wrapper.className = 'tradingview-widget-container';
  wrapper.style.cssText = 'width:100%;height:100%;';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  inner.style.cssText = 'width:100%;height:100%;';
  wrapper.appendChild(inner);
  wrapper.appendChild(script);
  container.appendChild(wrapper);
}

function embedTAWidget(containerId, symbol) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    "interval": "1D",
    "width": "100%",
    "height": "100%",
    "isTransparent": true,
    "symbol": symbol,
    "showIntervalTabs": true,
    "colorTheme": "dark",
    "locale": "en"
  });
  const wrapper = document.createElement('div');
  wrapper.className = 'tradingview-widget-container';
  wrapper.style.cssText = 'width:100%;height:100%;';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  inner.style.cssText = 'width:100%;height:100%;';
  wrapper.appendChild(inner);
  wrapper.appendChild(script);
  container.appendChild(wrapper);
}

// === EXPECTED MOVE DATA ===
let emData = {};
async function loadExpectedMoves() {
  try {
    const res = await fetch('data/expected-moves.json');
    const data = await res.json();
    emData = data.tickers || {};
    console.log('[EM] Loaded', Object.keys(emData).length, 'tickers');
  } catch(e) { console.warn('No expected-moves data:', e); }
}
loadExpectedMoves();

function buildExpectedMoveHTML(symbol, currentPrice) {
  const em = emData[symbol];
  if (!em) return '';

  const close = em.close;
  const price = currentPrice || close;
  const d = em.daily || {};
  const w = em.weekly || {};
  const m = em.monthly || {};
  const q = em.quarterly || {};

  if (!w.upper || !w.lower) return '';

  // Visual band — show weekly range with current price marker
  const lo = w.lower;
  const hi = w.upper;
  const range = hi - lo;
  const pad = range * 0.15; // 15% padding
  const viewLo = lo - pad;
  const viewHi = hi + pad;
  const viewRange = viewHi - viewLo;

  const pctLo = ((lo - viewLo) / viewRange * 100).toFixed(1);
  const pctMid = ((close - viewLo) / viewRange * 100).toFixed(1);
  const pctHi = ((hi - viewLo) / viewRange * 100).toFixed(1);
  const pctCur = Math.max(0, Math.min(100, ((price - viewLo) / viewRange * 100))).toFixed(1);

  // Determine if price is outside bands
  const outside = price > hi ? 'above' : price < lo ? 'below' : null;
  const outsideTag = outside
    ? `<span style="color:${outside === 'above' ? 'var(--cyan)' : 'var(--red)'};font-size:11px;font-weight:600;margin-left:8px;">● ${outside === 'above' ? 'ABOVE' : 'BELOW'} weekly EM</span>`
    : '';

  const proxy = em.futures_proxy ? ` <span style="font-size:10px;color:var(--text-dim);">(${em.futures_proxy.futures} proxy)</span>` : '';
  const expiry = em.weekly_expiry ? `Exp ${em.weekly_expiry.slice(4,6)}/${em.weekly_expiry.slice(6)}` : '';
  const straddle = em.straddle ? `Straddle $${em.straddle.toFixed(2)}` : '';
  const meta = [straddle, expiry, `K=${em.strike}`].filter(Boolean).join(' · ');

  return `
    <div class="em-banner">
      <h4>📐 Expected Move${proxy}${outsideTag}</h4>
      <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">${meta}</div>
      <div class="em-band-visual">
        <div class="em-band-line low" style="left:${pctLo}%"></div>
        <div class="em-band-label top" style="left:${pctLo}%;color:var(--red);transform:translateX(-50%)">L $${lo.toFixed(0)}</div>
        <div class="em-band-line mid" style="left:${pctMid}%"></div>
        <div class="em-band-label bottom" style="left:${pctMid}%;color:var(--text-dim);transform:translateX(-50%)">Mid $${close.toFixed(0)}</div>
        <div class="em-band-line high" style="left:${pctHi}%"></div>
        <div class="em-band-label top" style="left:${pctHi}%;color:var(--cyan);transform:translateX(-50%)">H $${hi.toFixed(0)}</div>
        <div class="em-band-line current" style="left:${pctCur}%"></div>
        <div class="em-band-label bottom" style="left:${pctCur}%;color:var(--gold);transform:translateX(-50%);font-size:11px;">▲ $${price.toFixed(2)}</div>
      </div>
      <div class="em-tiers">
        <div class="em-tier">
          <div class="tier-label">Daily</div>
          <div class="tier-value">±$${d.value || '—'}</div>
          <div class="tier-pct">${d.pct || '—'}%</div>
          <div class="tier-range">$${(d.lower||0).toFixed(0)}–$${(d.upper||0).toFixed(0)}</div>
        </div>
        <div class="em-tier active">
          <div class="tier-label">Weekly</div>
          <div class="tier-value">±$${w.value || '—'}</div>
          <div class="tier-pct">${w.pct || '—'}%</div>
          <div class="tier-range">$${lo.toFixed(0)}–$${hi.toFixed(0)}</div>
        </div>
        <div class="em-tier">
          <div class="tier-label">Monthly</div>
          <div class="tier-value">±$${m.value || '—'}</div>
          <div class="tier-pct">${m.pct || '—'}%</div>
          <div class="tier-range">$${(m.lower||0).toFixed(0)}–$${(m.upper||0).toFixed(0)}</div>
        </div>
        <div class="em-tier">
          <div class="tier-label">Quarterly</div>
          <div class="tier-value">±$${q.value || '—'}</div>
          <div class="tier-pct">${q.pct || '—'}%</div>
          <div class="tier-range">$${(q.lower||0).toFixed(0)}–$${(q.upper||0).toFixed(0)}</div>
        </div>
      </div>
    </div>
  `;
}

function generateSignals(t) {
  const signals = [];
  // SMA crossover
  if (t.smaCrossover === 'death_cross') {
    signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><circle cx="12" cy="10" r="8"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/><circle cx="15" cy="9" r="1.5" fill="currentColor"/><path d="M8 16h8"/></svg>', text: `Death cross: SMA20 < SMA50${t.smaCrossoverDate ? ` (since ~${t.smaCrossoverDate})` : ''}`, cls: 'signal-warn', priority: 2 });
  } else if (t.smaCrossover === 'golden_cross') {
    signals.push({ icon: '✨', text: `Golden cross: SMA20 > SMA50${t.smaCrossoverDate ? ` (since ~${t.smaCrossoverDate})` : ''}`, cls: 'signal-bull', priority: 2 });
  } else if (t.smaCrossover === 'compression') {
    signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14"/></svg>', text: `SMA compression: 20/50 converging — watch for directional move`, cls: 'signal-neutral', priority: 3 });
  }
  // Distance from 52w high
  if (t.pctFrom52wHigh != null) {
    if (t.pctFrom52wHigh < -20) {
      signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><polyline points="3 7 9 13 13 9 21 17"/><polyline points="15 17 21 17 21 11"/></svg>', text: `Correction territory: ${t.pctFrom52wHigh.toFixed(1)}% below 52-week high ($${t.high52w})`, cls: 'signal-warn', priority: 1 });
    } else if (t.pctFrom52wHigh < -10) {
      signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><polyline points="3 7 9 13 13 9 21 17"/><polyline points="15 17 21 17 21 11"/></svg>', text: `Trading ${t.pctFrom52wHigh.toFixed(1)}% below 52-week high ($${t.high52w})`, cls: 'signal-neutral', priority: 4 });
    } else if (t.pctFrom52wHigh > -2) {
      signals.push({ icon: '🏔️', text: `Near 52-week high (${t.pctFrom52wHigh.toFixed(1)}% from $${t.high52w})`, cls: 'signal-bull', priority: 3 });
    }
  }
  // RSI
  if (t.rsi != null) {
    if (t.rsi > 70) signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>', text: `RSI ${t.rsi} — overbought zone`, cls: 'signal-warn', priority: 1 });
    else if (t.rsi < 30) signals.push({ icon: '🟢', text: `RSI ${t.rsi} — oversold zone`, cls: 'signal-bull', priority: 1 });
    else if (t.rsi > 60) signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>', text: `RSI ${t.rsi} — bullish momentum`, cls: 'signal-bull', priority: 5 });
    else if (t.rsi < 40) signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>', text: `RSI ${t.rsi} — bearish momentum`, cls: 'signal-warn', priority: 5 });
  }
  // Bollinger squeeze
  if (t.bbWidthPercentile != null && t.bbWidthPercentile < 15) {
    signals.push({ icon: '🔋', text: `Bollinger squeeze (${t.bbWidthPercentile}th percentile) — expansion imminent`, cls: 'signal-neutral', priority: 2 });
  }
  // Volume
  if (t.volumeRatio != null) {
    if (t.volumeRatio > 2.0) signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M12 22c4.97 0 8-3.58 8-8 0-6-8-12-8-12S4 8 4 14c0 4.42 3.03 8 8 8z"/></svg>', text: `Heavy volume (${t.volumeRatio}x average) — strong conviction`, cls: 'signal-bull', priority: 2 });
    else if (t.volumeRatio > 1.5) signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="15 7 21 7 21 13"/></svg>', text: `Above-average volume (${t.volumeRatio}x) — watch for breakout`, cls: 'signal-bull', priority: 3 });
    else if (t.volumeRatio < 0.5) signals.push({ icon: '🔇', text: `Very low volume (${t.volumeRatio}x average) — thin conviction`, cls: 'signal-warn', priority: 4 });
  }
  // SMA200 support
  if (t.sma200 && t.price) {
    if (t.price < t.sma200) signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>', text: `Below SMA200 ($${t.sma200.toFixed(0)}) — long-term support broken`, cls: 'signal-warn', priority: 2 });
    else if (t.sma20 && t.price > t.sma200 && t.price < t.sma20 * 1.02 && t.price > t.sma20 * 0.98) {
      signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>', text: `Testing SMA20 — long-term trend intact (above SMA200)`, cls: 'signal-neutral', priority: 4 });
    }
  }
  // Earnings
  if (t.earningsDays != null && t.earningsDays <= 14) {
    signals.push({ icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="bt-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>', text: `Earnings in ${t.earningsDays} day${t.earningsDays !== 1 ? 's' : ''} (${t.earningsDate}) — expect volatility`, cls: 'signal-warn', priority: 0 });
  }
  // Sort by priority (lower = more important) and limit to 6
  signals.sort((a, b) => a.priority - b.priority);
  return signals.slice(0, 6);
}

function fmtVol(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return n.toString();
}
