<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist — BreakingTrades</title>
<style>
  :root {
    --bg-primary: #0a0a12;
    --bg-card: #111122;
    --bg-card-hover: #161630;
    --border: #1e1e3a;
    --text: #e0e0e8;
    --text-dim: #8888aa;
    --text-bright: #ffffff;
    --cyan: #00d4aa;
    --orange: #ffa726;
    --red: #ef5350;
    --gold: #ffd700;
    --blue: #42a5f5;
    --purple: #ab47bc;
    --yellow: #ffeb3b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .up { color: var(--cyan); }
  .down { color: var(--red); }
  .neutral { color: var(--text-dim); }

  /* === NAV BAR === */
  .nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 48px; background: #080810;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-size: 16px; font-weight: 700; color: var(--cyan); letter-spacing: 2px; }
  .nav-logo span { color: var(--text-dim); font-weight: 400; }
  .nav-links { display: flex; gap: 2px; }
  .nav-link {
    padding: 13px 16px; color: var(--text-dim); text-decoration: none;
    font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 2px solid transparent; transition: all 0.2s; font-family: inherit;
  }
  .nav-link:hover { color: var(--text); }
  .nav-link.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .tz-select {
    padding: 2px 4px; border-radius: 3px; border: 1px solid var(--border);
    background: #0c0c18; color: var(--text-dim); font-family: inherit;
    font-size: 11px; cursor: pointer; outline: none;
  }
  .tz-select:hover { border-color: var(--cyan); color: var(--text); }
  .timestamp { color: var(--text-dim); font-size: 11px; }

  /* === MACRO STRIP === */
  .macro-strip {
    display: flex; gap: 0; padding: 0; background: #0c0c18;
    border-bottom: 1px solid var(--border); overflow-x: auto;
  }
  .macro-pill {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    border-right: 1px solid var(--border); white-space: nowrap; min-width: fit-content;
  }
  .macro-pill .label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .macro-pill .value { font-size: 14px; font-weight: 600; }
  .macro-pill .change { font-size: 11px; }
  .vix-structure {
    font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
  }
  .vix-backwardation { background: rgba(239,83,80,0.1); color: var(--red); }

  /* === MAIN CONTENT === */
  .page-content {
    padding: 20px 24px;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .page-title {
    font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--cyan); font-weight: 600;
  }
  .view-toggle {
    display: flex; gap: 2px; background: var(--bg-card); border-radius: 4px; overflow: hidden;
  }
  .view-btn {
    padding: 6px 14px; background: none; border: none; color: var(--text-dim);
    font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--cyan); color: var(--bg-primary); }

  /* === TV WIDGET === */
  .tv-widget-wrap {
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
    background: var(--bg-card); margin-bottom: 24px;
  }

  /* === TABLE VIEW === */
  .watchlist-table-wrap {
    display: none; overflow-x: auto;
  }
  .watchlist-table {
    width: 100%; border-collapse: collapse;
  }
  .watchlist-table th {
    padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
    background: #0c0c18; position: sticky; top: 48px; z-index: 10;
  }
  .watchlist-table th:hover { color: var(--cyan); }
  .watchlist-table th .sort-arrow { margin-left: 4px; font-size: 8px; }
  .watchlist-table td {
    padding: 8px 12px; border-bottom: 1px solid #151530; white-space: nowrap;
  }
  .watchlist-table tr:hover td { background: var(--bg-card-hover); }
  .watchlist-table .ticker-cell {
    font-weight: 700; color: var(--text-bright); cursor: pointer;
  }
  .watchlist-table .ticker-cell:hover { color: var(--cyan); }
  .watchlist-table .sector-cell { color: var(--text-dim); font-size: 11px; }
  .bias-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .bias-badge.bull { background: rgba(0,212,170,0.15); color: var(--cyan); }
  .bias-badge.bear { background: rgba(239,83,80,0.15); color: var(--red); }
  .bias-badge.mixed { background: rgba(255,167,38,0.15); color: var(--orange); }
  .status-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600;
  }
  .status-badge.approaching { background: var(--orange-bg, rgba(255,167,38,0.1)); color: var(--orange); }
  .status-badge.active { background: rgba(0,212,170,0.1); color: var(--cyan); }
  .status-badge.exit { background: rgba(239,83,80,0.1); color: var(--red); }
  .status-badge.watching { background: rgba(136,136,170,0.1); color: var(--text-dim); }

  /* === SECTION HEADERS === */
  .section-header {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 768px) {
    .page-content { padding: 12px; }
    .nav-bar { padding: 0 12px; }
  }
</style>
</head>

<!-- MAIN CONTENT -->
<div class="page-content">

  </div>

  <!-- TradingView Market Overview Widget -->

    <div class="tradingview-widget-container" style="width:100%;height:calc(100vh - 140px);">

    </div>
  </div>

  <!-- Custom Table View -->
  <div class="watchlist-table-wrap" id="table-view">
    <table class="watchlist-table" id="wl-table">
      <thead>
        <tr>
          <th onclick="sortTable(0)">Ticker <span class="sort-arrow">▼</span></th>
          <th>Name</th>
          <th onclick="sortTable(2)">Sector</th>
          <th onclick="sortTable(3)">Price</th>
          <th onclick="sortTable(4)">Change %</th>
          <th onclick="sortTable(5)">SMA20</th>
          <th onclick="sortTable(6)">SMA50</th>
          <th onclick="sortTable(7)">Bias</th>
          <th onclick="sortTable(8)">Status</th>
        </tr>
      </thead>
      <tbody id="wl-tbody"></tbody>
    </table>
  </div>
</div>

<script>
// === WATCHLIST DATA ===
let watchlist = [];

async function loadWatchlist() {
  try {
    const res = await fetch('data/watchlist.json');
    watchlist = await res.json();
    renderTable();
  } catch (err) {
    console.error("Failed to load watchlist data:", err);
    document.getElementById('wl-tbody').innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--red);">Error loading live data. Please check back later.</td></tr>';
  }
}

// === VIEW TOGGLE ===
function showView(view) {
  document.getElementById('tv-widget-view').style.display = view === 'widget' ? 'block' : 'none';
  document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';
  document.getElementById('btn-widget').classList.toggle('active', view === 'widget');
  document.getElementById('btn-table').classList.toggle('active', view === 'table');
}

// === RENDER TABLE ===
let sortCol = 0, sortAsc = true;
function renderTable() {
  const sorted = [...watchlist].sort((a, b) => {
    const keys = ['symbol','name','sector','price','change','sma20','sma50','bias','status'];
    const key = keys[sortCol];
    let va = a[key], vb = b[key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('wl-tbody').innerHTML = sorted.map(s => {
    const chgClass = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'neutral';
    const dist20 = ((s.price - s.sma20) / s.sma20 * 100).toFixed(1);
    const dist50 = ((s.price - s.sma50) / s.sma50 * 100).toFixed(1);
    const d20Class = dist20 > 0 ? 'up' : 'down';
    const d50Class = dist50 > 0 ? 'up' : 'down';
    return `<tr>
      <td class="ticker-cell">${s.symbol}</td>
      <td style="color:var(--text-dim);font-size:11px;">${s.name}</td>
      <td class="sector-cell">${s.sector}</td>
      <td>$${s.price.toFixed(2)}</td>
      <td class="${chgClass}">${s.change > 0 ? '+' : ''}${s.change.toFixed(1)}%</td>
      <td><span class="${d20Class}">${dist20 > 0 ? '+' : ''}${dist20}%</span> <span style="color:var(--text-dim);font-size:10px;">($${s.sma20.toFixed(0)})</span></td>
      <td><span class="${d50Class}">${dist50 > 0 ? '+' : ''}${dist50}%</span> <span style="color:var(--text-dim);font-size:10px;">($${s.sma50.toFixed(0)})</span></td>
      <td><span class="bias-badge ${s.bias}">${s.bias.toUpperCase()}</span></td>
      <td><span class="status-badge ${s.status}">${s.status.toUpperCase()}</span></td>
    </tr>`;
  }).join('');
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

// === TIMEZONE ===
const TZ_LABELS = {
  'America/New_York':'ET','America/Chicago':'CT','America/Los_Angeles':'PT',
  'Europe/London':'GMT','Europe/Berlin':'CET','Asia/Jerusalem':'IST',
  'Asia/Tokyo':'JST','Australia/Sydney':'AEST','UTC':'UTC'
};
function initTimezone() {
  const saved = localStorage.getItem('bt_timezone');
  if (saved) document.getElementById('tz-picker').value = saved;
  document.getElementById('tz-picker').addEventListener('change', e => {
    localStorage.setItem('bt_timezone', e.target.value);
    updateTimestamp();
  });
  updateTimestamp();
  setInterval(updateTimestamp, 60000);
}
function updateTimestamp() {
  const tz = document.getElementById('tz-picker').value;
  const label = TZ_LABELS[tz] || tz;
  document.getElementById('ts').textContent =
    new Date().toLocaleString('en-US', { timeZone: tz, month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true }) + ' ' + label;
}

// === INIT ===
