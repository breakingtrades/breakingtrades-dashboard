name: Daily Briefing

on:
  schedule:
    # Mon-Fri at 6:30 AM ET (10:30 UTC during EDT, 11:30 UTC during EST)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  id-token: write  # For Azure OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai azure-identity yfinance pandas numpy requests

      - name: Azure Login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Export market data
        run: python scripts/export-dashboard-data.py
        continue-on-error: true  # Don't fail the whole job if yfinance is flaky

      - name: Export sector rotation
        run: python scripts/export-sector-rotation.py

      - name: Generate Tom's briefing
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT || 'https://openai-dev-nt6mukageprxm.openai.azure.com/' }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT || 'gpt-4.1' }}
        run: python scripts/generate-briefing.py

      - name: Commit and push
        run: |
          git config user.name "BreakingTrades Bot"
          git config user.email "bot@breakingtrades.github.io"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Daily briefing $(date -u +%Y-%m-%d)"
            git push
          fi
