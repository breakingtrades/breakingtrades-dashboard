name: Keepalive

on:
  schedule:
    # Runs daily at 8 AM ET (12 UTC) — prevents GitHub from pausing scheduled workflows
    # GitHub pauses schedules on repos with no activity. This keeps them alive.
    - cron: '0 12 * * 1-5'
  workflow_dispatch: {}

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping — keep scheduled workflows active
        run: echo "Keepalive $(date -u). This prevents GitHub from pausing intraday/EOD schedules."
