name: EOD Market Data Update

on:
  schedule:
    # Mon-Fri 4:20 PM ET = 20:20 UTC (EDT) / 21:20 UTC (EST)
    # Using 20:20 UTC — during EST it runs at 3:20 PM ET (close enough, market closed either way)
    - cron: '20 20 * * 1-5'
  workflow_dispatch:  # Manual trigger
    inputs:
      tier:
        description: 'EM tier override (daily/weekly/all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  eod-update:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Polygon free tier is slow (~80min for all tickers)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests yfinance pandas numpy

      - name: Run EOD update (commits + pushes inline)
        env:
          BT_EM_SOURCE: yfinance
          # NOTE: do NOT set BT_SKIP_PUSH here. eod-update.sh has its own
          # commit+push with rebase/conflict resolution and retry. Skipping
          # its push and re-staging in a downstream step strands the commit
          # on the runner (no-staged-diff -> "No changes to commit" -> nothing
          # pushed). That's exactly the bug that buried the Friday EM(all)
          # commits for weeks. Let the script own the push.
        run: |
          chmod +x scripts/eod-update.sh
          # Configure git identity for the in-script commit
          git config user.name  "BreakingTrades Bot"
          git config user.email "bot@breakingtrades.github.io"
          # Override tier if manually specified
          if [ -n "${{ github.event.inputs.tier }}" ]; then
            python scripts/update-expected-moves.py --source yfinance --tier "${{ github.event.inputs.tier }}" || echo "EM override failed"
          fi
          bash scripts/eod-update.sh
